openapi: 3.1.0
info:
  description: |
    Weft is an agent-first payments and discovery platform built on open
    protocols (x402 for stablecoin payments, EIP-3009 for transfer-with-authorization,
    ERC-8004 for agent identity). This API powers agent self-enrollment, payment
    flows, and the dashboard control plane.

    All endpoints under `/api/v1` are organization-scoped and require a bearer
    API key. Errors share the envelope defined by `ErrorResponse`.
  title: Weft API
  version: 0.4.0
servers:
- description: Production
  url: https://api.weftlabs.com
- description: Staging
  url: https://staging-api.weftlabs.com
- description: Development
  url: http://localhost:3000
tags:
- description: Account creation and authentication flows
  name: Auth
- description: Current user account information
  name: Account
- description: Payment history and transaction details
  name: Payments
- description: Manage API keys for authentication
  name: API Keys
- description: "Agent management — create, update, and list your agents"
  name: Agents
- description: Payment analytics and volume statistics
  name: Analytics
- description: Configure outbound webhook endpoints to receive payment events
  name: Webhooks
- description: |
    Self-enrollment for agents and resources. The agent-first onboarding
    path: an unauthenticated agent registers itself as a "ghost" Resource
    and receives a single-use claim token. The agent's human controller
    then claims the Resource via the dashboard, attaching it to their
    organization.
  name: Resources
- description: |
    Public storefront for `data_api` Resources. `/apis/{slug}` returns the
    OpenAPI 3.1 document published by a claimed, public-or-unlisted
    Resource. Pricing is intentionally not surfaced — under x402, price
    is negotiated per-request via the `402 Payment Required` challenge
    from the resource server.
  name: Public APIs
paths:
  /api/v1/docs:
    get:
      operationId: getApiDocs
      responses:
        "200":
          content:
            application/yaml:
              schema:
                type: string
          description: OpenAPI document
      summary: Fetch OpenAPI spec
  /api/v1/auth/sign_up:
    post:
      operationId: signUp
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
          description: Account created
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Validation error
      summary: Create an account
      tags:
      - Auth
  /api/v1/auth/confirm:
    post:
      operationId: confirmAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
          description: Account confirmed
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Invalid token
      summary: Confirm an account
      tags:
      - Auth
  /api/v1/auth/resend-confirmation:
    post:
      operationId: resendConfirmation
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendConfirmationRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: Confirmation sent
      summary: Resend confirmation email
      tags:
      - Auth
  /api/v1/auth/sign_in:
    post:
      operationId: signIn
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignInRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
          description: Signed in
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Invalid credentials
      summary: Sign in with email and password
      tags:
      - Auth
  /api/v1/auth/password/reset:
    post:
      operationId: requestPasswordReset
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: Reset email sent
      summary: Request password reset
      tags:
      - Auth
  /api/v1/auth/password/update:
    post:
      operationId: updatePassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordUpdateRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: Password updated
      summary: Update password with reset token
      tags:
      - Auth
  /api/v1/me:
    get:
      operationId: getMe
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
          description: Current user account
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: Get current account
      tags:
      - Account
  /api/v1/payments:
    get:
      operationId: listPayments
      parameters:
      - description: Page number
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - description: Items per page
        explode: true
        in: query
        name: per_page
        required: false
        schema:
          default: 25
          maximum: 100
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentListResponse"
          description: List of payments
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: List payments
      tags:
      - Payments
  /api/v1/payments/{id}:
    get:
      operationId: getPayment
      parameters:
      - description: Payment ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
          description: Payment details
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Payment not found
      security:
      - bearerAuth: []
      summary: Get payment details
      tags:
      - Payments
  /api/v1/api_keys:
    get:
      operationId: listApiKeys
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyListResponse"
          description: List of API keys
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: List API keys
      tags:
      - API Keys
    post:
      operationId: createApiKey
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreatedResponse"
          description: "API key created (includes raw key, shown only once)"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Validation error
      security:
      - bearerAuth: []
      summary: Create an API key
      tags:
      - API Keys
  /api/v1/api_keys/{id}:
    delete:
      operationId: revokeApiKey
      parameters:
      - description: API key ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: API key revoked
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: API key not found
      security:
      - bearerAuth: []
      summary: Revoke an API key
      tags:
      - API Keys
  /api/v1/agents:
    get:
      operationId: listAgents
      parameters:
      - description: Page number
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - description: Items per page
        explode: true
        in: query
        name: per_page
        required: false
        schema:
          default: 25
          maximum: 100
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponse"
          description: List of agents
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: List agents
      tags:
      - Agents
    post:
      operationId: createAgent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"
          description: Agent created
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Validation error
      security:
      - bearerAuth: []
      summary: Create an agent
      tags:
      - Agents
  /api/v1/agents/{id}:
    get:
      operationId: getAgent
      parameters:
      - description: Agent ID or slug
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"
          description: Agent details
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Agent not found
      security:
      - bearerAuth: []
      summary: Get agent details
      tags:
      - Agents
    patch:
      operationId: updateAgent
      parameters:
      - description: Agent ID or slug
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"
          description: Agent updated
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Agent not found
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Validation error
      security:
      - bearerAuth: []
      summary: Update an agent
      tags:
      - Agents
  /api/v1/analytics:
    get:
      operationId: getAnalytics
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsResponse"
          description: Analytics data
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: Get payment analytics
      tags:
      - Analytics
  /api/v1/webhook_endpoints:
    get:
      operationId: listWebhookEndpoints
      parameters:
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: per_page
        required: false
        schema:
          default: 25
          maximum: 100
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpointListResponse"
          description: Paginated list of webhook endpoints
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: List webhook endpoints
      tags:
      - Webhooks
    post:
      operationId: createWebhookEndpoint
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookEndpointRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpointCreatedResponse"
          description: Webhook endpoint created. The signing secret is only returned
            once.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Validation error
      security:
      - bearerAuth: []
      summary: Create a webhook endpoint
      tags:
      - Webhooks
  /api/v1/webhook_endpoints/{id}:
    delete:
      operationId: deleteWebhookEndpoint
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: Webhook endpoint deleted
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Webhook endpoint not found
      security:
      - bearerAuth: []
      summary: Delete a webhook endpoint
      tags:
      - Webhooks
    get:
      operationId: getWebhookEndpoint
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpointResponse"
          description: Webhook endpoint details
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Webhook endpoint not found
      security:
      - bearerAuth: []
      summary: Get a webhook endpoint
      tags:
      - Webhooks
    patch:
      operationId: updateWebhookEndpoint
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWebhookEndpointRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpointResponse"
          description: Webhook endpoint updated
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Webhook endpoint not found
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Validation error
      security:
      - bearerAuth: []
      summary: Update a webhook endpoint
      tags:
      - Webhooks
  /api/v1/resources/enroll:
    post:
      description: |
        Public, unauthenticated endpoint. An agent (or its operator) creates
        a ghost Resource — a Resource with no Provider attached. The server
        generates the slug and a single-use `claim_token`. The enrolling
        client passes the `claim_url` back to its human controller, who
        signs up and visits the URL to claim the Resource into their
        organization.

        **Rate limit:** 10 enrollments / hour / IP. Exceeding the limit
        returns `429 Too Many Requests`.

        **Server-controlled fields:** `slug` is generated from `name` and
        cannot be supplied. `category` is intentionally rejected — domain
        category is set after claim, by the human, from a constrained list.
      operationId: enrollResource
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollResourceRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrolledResourceResponse"
          description: Resource enrolled. Response includes the single-use claim token
            and URL.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: "Validation error (invalid `kind`, missing required field,\
            \ slug collision after retry, etc.)"
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Rate limit exceeded (>10 enrollments/hour from this IP)
      summary: Self-enroll a Resource (ghost)
      tags:
      - Resources
  /apis/{slug}:
    get:
      description: |
        Returns the OpenAPI 3.1 document published by a claimed,
        public-or-unlisted `data_api` Resource. Pricing is intentionally
        absent — under x402 the price is negotiated per-request via the
        `402 Payment Required` challenge from the resource server itself.

        Browsers (`Accept: text/html`) get an Inertia-rendered HTML landing
        page instead; SDKs and tooling should prefer
        `GET /apis/{slug}/openapi` to avoid content-type negotiation.

        Ghost Resources (no Provider attached) and `private_profile`
        Resources return `404`.
      operationId: getApiBySlug
      parameters:
      - description: Resource slug
        explode: false
        in: path
        name: slug
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenApiDocument"
          description: OpenAPI 3.1 document
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: "Resource not found, ghost (unclaimed), or private"
      summary: Get a public OpenAPI document for a data_api Resource
      tags:
      - Public APIs
  /apis/{slug}/openapi:
    get:
      description: |
        Always returns the OpenAPI 3.1 JSON document, regardless of `Accept`
        header. SDKs and code-generators should use this path; it is not
        subject to the HTML/JSON content-type negotiation that `GET /apis/{slug}`
        performs.

        Same visibility rules as `GET /apis/{slug}` (Ghost Resources and
        `private_profile` Resources return `404`).
      operationId: getApiOpenApiBySlug
      parameters:
      - description: Resource slug
        explode: false
        in: path
        name: slug
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenApiDocument"
          description: OpenAPI 3.1 document
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: "Resource not found, ghost (unclaimed), or private"
      summary: Get the OpenAPI document for a data_api Resource (deterministic JSON)
      tags:
      - Public APIs
components:
  schemas:
    ErrorResponse:
      description: |
        Standard error envelope returned by all `/api/v1` endpoints when a
        request fails. The `error.code` value is stable across releases and
        safe to branch on; `error.message` is human-readable and may change.
      example:
        error:
          code: unauthorized
          message: Invalid or expired API key
          request_id: req_01HX9F3K7B2N4P8Q1R6T8Y2Z5
      properties:
        error:
          $ref: "#/components/schemas/Error"
      required:
      - error
    MessageResponse:
      example:
        data:
          message: message
      properties:
        data:
          $ref: "#/components/schemas/MessageResponse_data"
      required:
      - data
    AuthResponse:
      example:
        data:
          confirmation_required: true
          user:
            id: 0
            email: email
            status: status
          token: token
      properties:
        data:
          $ref: "#/components/schemas/AuthResponse_data"
      required:
      - data
    User:
      example:
        id: 0
        email: email
        status: status
      properties:
        id:
          type: integer
        email:
          format: email
          type: string
        status:
          type: string
      required:
      - email
      - id
    MeResponse:
      example:
        data:
          public_profile: true
          created_at: 2000-01-23T04:56:07.000+00:00
          id: 0
          display_name: display_name
          email: email
          public_slug: public_slug
          status: active
      properties:
        data:
          $ref: "#/components/schemas/AccountDetails"
      required:
      - data
    AccountDetails:
      example:
        public_profile: true
        created_at: 2000-01-23T04:56:07.000+00:00
        id: 0
        display_name: display_name
        email: email
        public_slug: public_slug
        status: active
      properties:
        id:
          type: integer
        email:
          format: email
          type: string
        status:
          enum:
          - active
          - blocked
          type: string
        display_name:
          type: string
          nullable: true
        public_profile:
          type: boolean
        public_slug:
          type: string
          nullable: true
        created_at:
          format: date-time
          type: string
      required:
      - created_at
      - email
      - id
      - public_profile
      - status
    Payment:
      example:
        amount: 6
        resource_url: resource_url
        resource_host: resource_host
        tx_hash: tx_hash
        recipient_address: recipient_address
        settlement_latency_ms: 5
        api_key_name: api_key_name
        network: network
        fee_amount: 1
        amount_formatted: amount_formatted
        currency: currency
        id: 0
        settled_at: 2000-01-23T04:56:07.000+00:00
        payer_address: payer_address
      properties:
        id:
          type: integer
        tx_hash:
          type: string
        payer_address:
          type: string
        recipient_address:
          type: string
        amount:
          description: "Amount in atomic units (1 USDC = 1,000,000)"
          type: integer
        amount_formatted:
          description: Human-readable amount (e.g. "1.00 USDC")
          type: string
        currency:
          type: string
        network:
          description: CAIP-2 chain identifier
          type: string
        resource_url:
          type: string
          nullable: true
        resource_host:
          type: string
          nullable: true
        fee_amount:
          type: integer
        settlement_latency_ms:
          type: integer
          nullable: true
        settled_at:
          format: date-time
          type: string
        api_key_name:
          type: string
      required:
      - amount
      - amount_formatted
      - api_key_name
      - currency
      - id
      - network
      - payer_address
      - recipient_address
      - settled_at
      - tx_hash
    PaymentListResponse:
      example:
        pagination:
          per_page: 2
          total: 7
          page: 5
          total_pages: 9
        data:
        - amount: 6
          resource_url: resource_url
