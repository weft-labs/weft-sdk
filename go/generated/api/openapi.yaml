            \ with trailing zeros trimmed so sub-cent micro-payments survive (\"0.0005\"\
            , \"0.42\"); a zero total renders as \"0\"."
          example: "0.0005"
          type: string
        spent_week_usd:
          description: "USD spent in the current calendar week (UTC, Monday start).\
            \ Up to 6 decimals with trailing zeros trimmed (\"0.0005\", \"3.10\");\
            \ a zero total renders as \"0\"."
