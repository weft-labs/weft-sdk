        dispute_count:
          description: All-time dispute count for this merchant address.
          minimum: 0
          type: integer
      required:
      - address
      - dispute_count
      - first_seen_at
      - settlement_count
    FetchErrorResponse:
      description: |
        Bespoke error envelope for `/api/v1/fetch`. Every error carries the
        buyer's current `policy`, `balance`, and a `dashboard_url` so a CLI
        can render an actionable message without a second round-trip.

        `error` values include the fixed codes listed below plus the
        family `POLICY_VIOLATION_<REASON>` (e.g. `POLICY_VIOLATION_DAILY_LIMIT`)
        where `<REASON>` matches the violated policy field.
      example:
        balance:
          promo_usd: "0.00"
          spent_today_usd: "0.42"
          wallet_usdc: "12.34"
        details:
          key: ""
        error: EXCEEDED_MAX_COST
        dashboard_url: https://openapi-generator.tech
        policy:
          weekly_limit_usd: "50.00"
          daily_limit_usd: "10.00"
          max_tx_usd: "1.00"
      properties:
        error:
          description: Stable error code.
          enum:
          - INVALID_URL
          - EXCEEDED_MAX_COST
          - INSUFFICIENT_BALANCE
          - MERCHANT_RETURNED_NON_402
          - ARTIFACT_TOO_LARGE
          - DENYLISTED_RECIPIENT
          - SETTLEMENT_FAILED
          - POLICY_VIOLATION
          example: EXCEEDED_MAX_COST
          type: string
        details:
          additionalProperties: true
          description: Optional context. Shape varies by error code.
          type: object
        policy:
          $ref: "#/components/schemas/SpendingPolicy"
        balance:
          $ref: "#/components/schemas/FetchBalanceSnapshot"
        dashboard_url:
          description: Deep-link to the dashboard's policy page.
          format: uri
          type: string
      required:
      - balance
      - dashboard_url
      - details
      - error
      - policy
    FetchBalanceSnapshot:
      description: |
        Compact balance snapshot returned inside `FetchErrorResponse`. Less
        rich than `BalanceResponse` — just the three fields a CLI needs to
        explain why a fetch failed.
      example:
        promo_usd: "0.00"
        spent_today_usd: "0.42"
        wallet_usdc: "12.34"
      properties:
        promo_usd:
          example: "0.00"
          type: string
        wallet_usdc:
          example: "12.34"
          type: string
        spent_today_usd:
          example: "0.42"
          type: string
      required:
      - promo_usd
      - spent_today_usd
      - wallet_usdc
    MessageResponse_data:
      example:
        message: message
      properties:
        message:
          type: string
      required:
      - message
    AuthResponse_data:
      example:
        confirmation_required: true
        user:
          id: 0
          email: email
          status: status
        token: token
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          nullable: true
        confirmation_required:
          type: boolean
      required:
      - confirmation_required
      - user
    SearchSkill_endpoint:
      additionalProperties: true
      example:
        path: path
        method: method
      properties:
        method:
          description: HTTP method or `WEBSOCKET` for streaming skills.
          type: string
        path:
          type: string
    FetchRequest_body:
      description: Request body forwarded to the upstream. Pass `null` for GET.
      nullable: true
      oneOf:
      - type: string
      - type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: APIKey
      scheme: bearer
      type: http
