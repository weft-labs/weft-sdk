    SearchErrorResponse:
      description: |
        Bespoke error envelope returned by `/api/v1/search` for `422`, `502`,
        and `500` responses. It differs from the standard `ErrorResponse`
        envelope (no nested `code`/`message`/`request_id`); SDK clients
        should handle both shapes for this endpoint until the controller
        is migrated to the standard envelope.
      example:
        details:
          key: ""
        error: INVALID_QUERY
      properties:
        error:
          description: Stable error code.
          enum:
          - INVALID_QUERY
          - INVALID_MAX_RESULTS
          - INVALID_FILTERS
          - UNKNOWN_PARAMETER
          - SEARCH_UPSTREAM_ERROR
          - SEARCH_BACKEND_MISCONFIGURED
          type: string
        details:
          additionalProperties: true
          description: Optional context. Shape varies by error code.
          type: object
      required:
      - error
    FetchRequest:
      example:
        headers:
          Accept: application/json
          User-Agent: my-agent/1.0
        method: GET
        body: FetchRequest_body
        max_cost_usd: "0.05"
        url: https://x402.api.agentmail.to/v0/inboxes
      properties:
        url:
          description: Target URL. Must pass Weft's URL safety check (no SSRF / private
            IP ranges).
          example: https://x402.api.agentmail.to/v0/inboxes
          format: uri
          type: string
        max_cost_usd:
          default: "0.10"
          description: Hard ceiling on what the buyer is willing to pay. Defaults
            to `0.10` USD.
          example: "0.05"
          pattern: "^\\d+(\\.\\d{1,6})?$"
          type: string
        method:
          default: GET
          description: HTTP method to use against the upstream.
          enum:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          type: string
        body:
          $ref: "#/components/schemas/FetchRequest_body"
        headers:
          additionalProperties:
            type: string
          description: |
            Headers forwarded to the upstream. Up to 32 headers, 4 KB
            total. The following are silently stripped: `host`,
            `authorization`, `cookie`, `proxy-authorization`,
            `x-forwarded-*`, `x-real-ip`, `x-payment`, `connection`,
            `upgrade`.
          example:
            Accept: application/json
            User-Agent: my-agent/1.0
      required:
      - url
    FetchResponse:
      description: |
        Successful fetch envelope. `body_base64` is the upstream artifact
        bytes, base64-encoded. `paid_usd`, `held_usd`, `payment_status`,
        `tx_hash`, and `merchant` are populated only when the upstream
        charged for the response.

        `paid_usd` is "0" (never the nominal charge amount) until the charge
        is CONFIRMED settled on-chain — a signed-but-unsettled hold reports
        its amount in `held_usd` instead. This is a deliberate honesty fix:
        earlier versions of this endpoint returned the nominal amount in
        `paid_usd` unconditionally, even when the charge never settled.
      example:
        headers:
          key: headers
        held_usd: "0.002"
        payment_status: pending
        paid_usd: "0.002"
        body_base64: body_base64
        merchant: ""
        tx_hash: tx_hash
        artifact_id: 0
        status: 200
      properties:
        status:
          description: HTTP status returned by the upstream after the paid replay.
          example: 200
          type: integer
        headers:
          additionalProperties:
            type: string
          description: Response headers from the upstream.
        body_base64:
          description: Base64-encoded response body. Empty string for empty bodies.
          type: string
        paid_usd:
          description: |
            USD amount actually settled on-chain. "0" for free upstreams AND
            for any charge that hasn't (yet, or ever) settled — a signed hold
            is not yet spend. See `held_usd` for the nominal amount in that case.
          example: "0.002"
          type: string
          nullable: true
        held_usd:
          description: |
            The nominal charge amount when `paid_usd` is "0" — a hold awaiting
            settlement, or a charge that failed/expired without ever settling.
            `null` once `paid_usd` reflects the real settlement (or for a free
            upstream, where nothing was ever charged).
          example: "0.002"
          type: string
          nullable: true
        payment_status:
          description: |
            Agent-facing settlement status. `pending` = signed, no refusal
            signal yet (settlement may still land, e.g. x402's async
            facilitator webhook). `declined-pending` = the merchant refused
            but the authorization isn't provably dead yet. `declined` /
            `expired` / `reverted` are terminal — the money never moved (or,
            for `reverted`, moved and then reversed on-chain) and never will
            for this charge.
          enum:
          - settled
          - pending
          - declined-pending
          - declined
          - expired
          - reverted
          example: pending
          type: string
        tx_hash:
          description: Settlement transaction hash. Null for free upstreams.
          type: string
          nullable: true
        artifact_id:
          description: Internal artifact identifier if the response was persisted;
            `null` otherwise.
          type: integer
          nullable: true
        merchant:
          allOf:
          - $ref: "#/components/schemas/Merchant"
          description: Merchant reputation snapshot. Null for free upstreams.
          nullable: true
      required:
      - artifact_id
      - body_base64
      - headers
      - held_usd
      - merchant
      - paid_usd
      - payment_status
      - status
      - tx_hash
    Merchant:
      properties:
        address:
          description: EVM address that received the payment.
          type: string
        settlement_count:
          description: All-time settlement count for this merchant address.
          minimum: 0
          type: integer
        first_seen_at:
          description: First time Weft observed a payment to this address.
          format: date-time
          type: string
          nullable: true
        dispute_count:
          description: All-time dispute count for this merchant address.
          minimum: 0
          type: integer
      required:
      - address
      - dispute_count
      - first_seen_at
      - settlement_count
    FetchErrorResponse:
      description: |
        Bespoke error envelope for `/api/v1/fetch`. Every error carries the
        buyer's current `policy`, `balance`, and a `dashboard_url` so a CLI
        can render an actionable message without a second round-trip.

        `error` values include the fixed codes listed below plus the
        `POLICY_VIOLATION_<REASON>` family, where `<REASON>` is the violated
        policy field (`MAX_TX`, `DAILY`, or `WEEKLY` — see
        `PolicyViolation::REASONS`).
      example:
        balance:
          promo_usd: "0.00"
          spent_today_usd: "0.42"
          total_usd: "15.34"
          wallet_usdc: "12.34"
          tempo_usd: "3.00"
        details:
          key: ""
        error: EXCEEDED_MAX_COST
        dashboard_url: https://openapi-generator.tech
        policy:
          weekly_limit_usd: "50.00"
          daily_limit_usd: "10.00"
          max_tx_usd: "1.00"
      properties:
        error:
          description: Stable error code.
          enum:
          - INVALID_URL
          - EXCEEDED_MAX_COST
          - INSUFFICIENT_BALANCE
          - CONVERSION_UNAVAILABLE
          - MERCHANT_RETURNED_NON_402
          - ARTIFACT_TOO_LARGE
          - DENYLISTED_RECIPIENT
          - WALLET_ENVIRONMENT_MISMATCH
          - SETTLEMENT_FAILED
          - UNSUPPORTED_PAYMENT_METHOD
          - UNSUPPORTED_ASSET
          - POLICY_VIOLATION_MAX_TX
          - POLICY_VIOLATION_DAILY
          - POLICY_VIOLATION_WEEKLY
          example: EXCEEDED_MAX_COST
          type: string
        details:
          additionalProperties: true
          description: Optional context. Shape varies by error code.
          type: object
        policy:
          $ref: "#/components/schemas/SpendingPolicy"
        balance:
          $ref: "#/components/schemas/FetchBalanceSnapshot"
        dashboard_url:
          description: Deep-link to the dashboard's policy page.
          format: uri
          type: string
      required:
      - balance
      - dashboard_url
      - details
      - error
      - policy
    FetchBalanceSnapshot:
      description: |
        Compact balance snapshot returned inside `FetchErrorResponse`. Less
        rich than `BalanceResponse` — just the fields a CLI needs to explain
        why a fetch failed.
      example:
        promo_usd: "0.00"
        spent_today_usd: "0.42"
        total_usd: "15.34"
        wallet_usdc: "12.34"
        tempo_usd: "3.00"
      properties:
        promo_usd:
          example: "0.00"
          type: string
        wallet_usdc:
          description: Live Base USDC balance.
          example: "12.34"
          type: string
        tempo_usd:
          description: |
            Aggregated USD of allowlisted Tempo dollar tokens, 2dp. `null` when UNKNOWN (RPC read failed or no token allowlisted for the paired chain) — never "0.00" for an unread component.
          example: "3.00"
          type: string
          nullable: true
        total_usd:
          description: |
            Aggregated USD balance = Base USDC + Tempo dollar tokens, 2dp. Equals `wallet_usdc` alone when `tempo_usd` is null. Null when the Base USDC provider is unreachable.
          example: "15.34"
          type: string
          nullable: true
        spent_today_usd:
          example: "0.42"
          type: string
      required:
      - promo_usd
      - spent_today_usd
      - tempo_usd
      - total_usd
      - wallet_usdc
    fetch_403_response:
      oneOf:
      - $ref: "#/components/schemas/FetchErrorResponse"
      - $ref: "#/components/schemas/InsufficientScopeResponse"
    MessageResponse_data:
      example:
        message: message
      properties:
        message:
          type: string
      required:
      - message
