openapi: 3.1.0
info:
  description: |
    The Weft API is the buyer-runtime surface that powers the `weft` CLI,
    the hosted MCP server (`weft.network/mcp`), and any third-party agent
    that wants to discover and pay for paid resources on Weft. v1 covers
    five buyer concerns:

      1. Account onboarding (`/api/v1/auth/*`, `/api/v1/me`)
      2. CLI authentication (`/api/v1/api_keys`)
      3. Wallet visibility (`/api/v1/balance`)
      4. Discovery (`/api/v1/search`)
      5. Paid execution (`/api/v1/fetch`)
      6. Purchase history (`/api/v1/payments`)

    Seller-side concerns (agent management, payout analytics, webhook
    delivery, the public storefront for `data_api` resources) live in the
    dashboard and are intentionally not documented here. They will be
    split out into a separate, dashboard-scoped spec when they need to be
    SDK-consumable.

    All errors share the envelope defined by `ErrorResponse`, except the
    buyer-runtime endpoints (`/search`, `/fetch`) which use bespoke
    envelopes carrying additional context — see `SearchErrorResponse` and
    `FetchErrorResponse`.
  title: Weft API
  version: 0.6.0
servers:
- description: Production
  url: https://api.weftlabs.com
- description: Staging
  url: https://staging-api.weftlabs.com
- description: Development
  url: http://localhost:3000
tags:
- description: Account creation and authentication flows.
  name: Auth
- description: Current user account information.
  name: Account
- description: Manage API keys used by the CLI and any direct HTTP caller.
  name: API Keys
- description: |
    Read-only snapshot of the buyer's wallet, spending policy, and
    current-window spend (today / this week).
  name: Balance
- description: |
    Semantic search across the Weft index of paid agent resources.
    Returns A2A-shaped AgentCards with pricing, skills, ranking, and
    endpoints. The mock backend (default while the search-platform is
    unshipped) reads YAML fixtures from `db/seeds/mock-search/`; the
    platform backend proxies to the upstream search service. Both share
    the same response envelope.
  name: Search
- description: |
    The universal x402 fetch proxy. POST any URL the agent wants to
    reach, with a `max_cost_usd` ceiling; Weft handles the `402 Payment
    Required` challenge, signs the EIP-3009 payment from the buyer's
    wallet, replays the request, and streams the upstream artifact
    back base64-encoded. Errors always carry the buyer's current
    policy + balance + dashboard URL so the caller can surface "what
    changed?" without a second round-trip.
  name: Fetch
- description: Payment history and individual purchase details.
  name: Payments
paths:
  /docs/openapi.yaml:
    get:
      operationId: getOpenApiDocument
      responses:
        "200":
          content:
            application/yaml:
              schema:
                type: string
          description: OpenAPI 3.1 document (YAML)
      summary: Fetch this OpenAPI document
  /api/v1/auth/sign_up:
    post:
      operationId: signUp
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
          description: Account created
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Validation error
      summary: Create an account
      tags:
      - Auth
  /api/v1/auth/confirm:
    post:
      operationId: confirmAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
          description: Account confirmed
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Invalid token
      summary: Confirm an account
      tags:
      - Auth
  /api/v1/auth/resend-confirmation:
    post:
      operationId: resendConfirmation
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendConfirmationRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: Confirmation sent
      summary: Resend confirmation email
      tags:
      - Auth
  /api/v1/auth/sign_in:
    post:
      operationId: signIn
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignInRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
          description: Signed in
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Invalid credentials
      summary: Sign in with email and password
      tags:
      - Auth
  /api/v1/auth/password/reset:
    post:
      operationId: requestPasswordReset
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: Reset email sent
      summary: Request password reset
      tags:
      - Auth
  /api/v1/auth/password/update:
    post:
      operationId: updatePassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordUpdateRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: Password updated
      summary: Update password with reset token
      tags:
      - Auth
  /api/v1/me:
    get:
      operationId: getMe
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
          description: Current user account
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: Get current account
      tags:
      - Account
  /api/v1/api_keys:
    get:
      operationId: listApiKeys
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyListResponse"
          description: List of API keys
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: List API keys
      tags:
      - API Keys
    post:
      operationId: createApiKey
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreatedResponse"
          description: "API key created (includes raw key, shown only once)"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Validation error
      security:
      - bearerAuth: []
      summary: Create an API key
      tags:
      - API Keys
  /api/v1/api_keys/{id}:
    delete:
      operationId: revokeApiKey
      parameters:
      - description: API key ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: API key revoked
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: API key not found
      security:
      - bearerAuth: []
      summary: Revoke an API key
      tags:
      - API Keys
  /api/v1/balance:
    get:
      description: |
        Read-only snapshot for the buyer behind the bearer token. The
        response always includes a `promo` block — values are zero in v1
        and fill in once the freemium promo ledger ships, without a
        shape change. `wallet.balance_usdc` is fetched live from Privy;
        if Privy is unreachable the field returns `"0.00"` rather than
        erroring the whole call.

        Account-scoped: the bearer must be a buyer-scoped API key.
      operationId: getBalance
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceResponse"
          description: Wallet + policy + spend snapshot
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized — missing or non-buyer-scoped API key
      security:
      - bearerAuth: []
      summary: "Get wallet, spending policy, and current-window spend"
      tags:
      - Balance
  /api/v1/search:
    post:
      description: |
        Semantic search over the Weft index of paid agent resources. The
        request body carries a free-text `query`, an optional `limit`, and
        an optional `filters` object that narrows by price band, payment
        protocol, agent protocol, or domain tag. Filters are applied as a
        post-filter after the embedding score is computed.

        Backend selection is server-side via the `SEARCH_BACKEND` env var:
        `mock` (default, reads YAML fixtures and sets `_mock: true` in the
        response) or `platform` (proxies to the upstream search service).
        Both backends return the same envelope.

        Account-scoped: the bearer token must be a buyer-scoped API key.
        Free for authenticated buyers in v1; billing is planned for a later
        release.

        Response negotiation: `Accept: application/json` (default) returns
        the structured envelope; `Accept: text/markdown` returns a rendered
        Markdown digest of the same results — useful for piping into a chat
        UI or LLM prompt.
      operationId: search
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
            text/markdown:
              schema:
                description: Rendered Markdown digest of the same results.
                type: string
          description: Search results
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized — missing or non-buyer-scoped API key
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchErrorResponse"
          description: Invalid query (empty/missing)
        "502":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchErrorResponse"
          description: Upstream search backend error (platform backend only)
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchErrorResponse"
          description: Backend misconfigured (`SEARCH_BACKEND` unset or unknown)
      security:
      - bearerAuth: []
      summary: Search the Weft index
      tags:
      - Search
  /api/v1/fetch:
    post:
      description: |
        Universal x402 fetch proxy. The caller provides a target `url`,
        a hard `max_cost_usd` ceiling, and optional `method` / `body` /
        `headers`. Weft:

          1. Issues the request.
          2. On `402 Payment Required`, parses the merchant's challenge.
          3. Compares the asking price to `max_cost_usd` and the
             buyer's policy (`max_tx_usd`, daily/weekly limits).
          4. Signs an EIP-3009 transfer from the buyer's wallet.
          5. Replays the request with the `X-Payment` header.
          6. Streams the upstream artifact back, base64-encoded under
             `body_base64`, with `paid_usd`, `tx_hash`, and the
             merchant's reputation snapshot.

        Errors are structured with a stable `error` code, and each error
        response carries the buyer's `policy`, `balance`, and a
        `dashboard_url` so a CLI can render an actionable message without
        a second round-trip.

        Account-scoped: the bearer must be a buyer-scoped API key.

        **Forwarded headers:** the caller's `headers` are passed through
        to the upstream, except a denylist of hop-by-hop and
        Weft-internal headers (`host`, `authorization`, `cookie`,
        `proxy-authorization`, `x-forwarded-*`, `x-real-ip`,
        `x-payment`, `connection`, `upgrade`). Up to 32 headers, 4 KB of
        combined value bytes.
      operationId: fetch
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FetchRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchResponse"
          description: Fetch succeeded (or upstream was free); artifact streamed back
            base64-encoded.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized — missing or non-buyer-scoped API key
        "402":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchErrorResponse"
          description: Payment refused — `EXCEEDED_MAX_COST` or `INSUFFICIENT_BALANCE`.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchErrorResponse"
          description: Policy violation or denylisted recipient.
        "413":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchErrorResponse"
          description: Upstream artifact exceeded the proxy's size cap.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchErrorResponse"
          description: Invalid request URL.
        "502":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchErrorResponse"
          description: "Upstream did not return a valid 402 challenge, or settlement\
            \ signing failed."
      security:
      - bearerAuth: []
      summary: Pay-and-fetch any URL (x402 proxy)
      tags:
      - Fetch
  /api/v1/payments:
    get:
      operationId: listPayments
      parameters:
      - description: Page number
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - description: Items per page
        explode: true
        in: query
        name: per_page
        required: false
        schema:
          default: 25
          maximum: 100
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentListResponse"
          description: List of payments
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: List payments
      tags:
      - Payments
  /api/v1/payments/{id}:
    get:
      operationId: getPayment
      parameters:
      - description: Payment ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
          description: Payment details
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Payment not found
      security:
      - bearerAuth: []
      summary: Get payment details
      tags:
      - Payments
components:
  schemas:
    ErrorResponse:
      description: |
        Standard error envelope returned by all `/api/v1` endpoints except
        `/search` and `/fetch` (which use bespoke envelopes carrying
        additional context). `error.code` is stable across releases and
        safe to branch on; `error.message` is human-readable and may change.
      example:
        error:
          code: unauthorized
          message: Invalid or expired API key
          request_id: req_01HX9F3K7B2N4P8Q1R6T8Y2Z5
      properties:
        error:
          $ref: "#/components/schemas/Error"
      required:
      - error
    Error:
      description: |
        A single error inside an `ErrorResponse` envelope. `code` is the
        stable machine-readable identifier (snake_case), `message` is
        human-readable, `details` carries optional structured context
        (e.g. validation field breakdown), and `request_id` correlates
        with server logs for debugging.
      properties:
        code:
          description: Stable machine-readable error code (snake_case).
          example: validation_failed
          type: string
        message:
          description: Human-readable error description.
          example: Email has already been taken
          type: string
        details:
          description: Optional structured context about the failure.
          type: object
          nullable: true
        request_id:
          description: Correlates with server logs; include when reporting bugs.
          example: req_01HX9F3K7B2N4P8Q1R6T8Y2Z5
          type: string
      required:
      - code
      - message
    MessageResponse:
      example:
        data:
          message: message
      properties:
        data:
          $ref: "#/components/schemas/MessageResponse_data"
      required:
      - data
    Pagination:
      example:
        per_page: 1
        total: 5
        page: 6
        total_pages: 5
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
      required:
      - page
      - per_page
      - total
      - total_pages
    SignUpRequest:
      example:
        password: password
        password_confirmation: password_confirmation
        email: email
      properties:
        email:
          format: email
          type: string
        password:
          type: string
        password_confirmation:
          type: string
      required:
      - email
      - password
      - password_confirmation
    SignInRequest:
      example:
        password: password
        email: email
      properties:
        email:
          format: email
          type: string
        password:
          type: string
      required:
      - email
      - password
    ConfirmRequest:
      example:
        confirmation_token: confirmation_token
      properties:
        confirmation_token:
          type: string
      required:
      - confirmation_token
    ResendConfirmationRequest:
      example:
        email: email
      properties:
        email:
          format: email
          type: string
      required:
      - email
    PasswordResetRequest:
      example:
        email: email
      properties:
        email:
          format: email
          type: string
      required:
      - email
    PasswordUpdateRequest:
      example:
        password: password
        password_confirmation: password_confirmation
        reset_password_token: reset_password_token
      properties:
        reset_password_token:
          type: string
        password:
          type: string
        password_confirmation:
          type: string
      required:
      - password
      - password_confirmation
      - reset_password_token
    AuthResponse:
      example:
        data:
          confirmation_required: true
          user:
            id: 0
            email: email
            status: status
          token: token
      properties:
        data:
          $ref: "#/components/schemas/AuthResponse_data"
      required:
      - data
    User:
      example:
        id: 0
        email: email
        status: status
      properties:
        id:
          type: integer
        email:
          format: email
          type: string
        status:
          type: string
      required:
      - email
      - id
    MeResponse:
      example:
        data:
          public_profile: true
          created_at: 2000-01-23T04:56:07.000+00:00
          id: 0
          display_name: display_name
          email: email
          public_slug: public_slug
          status: active
      properties:
        data:
          $ref: "#/components/schemas/AccountDetails"
      required:
      - data
    AccountDetails:
      example:
        public_profile: true
        created_at: 2000-01-23T04:56:07.000+00:00
        id: 0
        display_name: display_name
        email: email
        public_slug: public_slug
        status: active
      properties:
        id:
          type: integer
        email:
          format: email
          type: string
        status:
          enum:
          - active
          - blocked
          type: string
        display_name:
          type: string
          nullable: true
        public_profile:
          type: boolean
        public_slug:
          type: string
          nullable: true
        created_at:
          format: date-time
          type: string
      required:
      - created_at
      - email
      - id
      - public_profile
      - status
    CreateApiKeyRequest:
      example:
        name: name
      properties:
        name:
          description: A friendly name for the API key
          type: string
    ApiKey:
      example:
        last_used_at: 2000-01-23T04:56:07.000+00:00
        revoked_at: 2000-01-23T04:56:07.000+00:00
        key_prefix: key_prefix
        name: name
        created_at: 2000-01-23T04:56:07.000+00:00
        id: 0
      properties:
        id:
          type: integer
        name:
          type: string
          nullable: true
        key_prefix:
          description: First 16 characters of the key for identification
          type: string
        last_used_at:
          format: date-time
          type: string
          nullable: true
        revoked_at:
          format: date-time
          type: string
          nullable: true
        created_at:
          format: date-time
          type: string
      required:
      - created_at
      - id
      - key_prefix
    ApiKeyCreated:
      example:
        key_prefix: key_prefix
        name: name
        created_at: 2000-01-23T04:56:07.000+00:00
        id: 0
        raw_key: raw_key
      properties:
        id:
          type: integer
        name:
          type: string
          nullable: true
        key_prefix:
          type: string
        raw_key:
          description: Full API key (shown only once at creation)
          type: string
        created_at:
          format: date-time
          type: string
      required:
      - created_at
      - id
      - key_prefix
      - raw_key
    ApiKeyListResponse:
      example:
        pagination:
          per_page: 1
          total: 5
          page: 6
          total_pages: 5
        data:
        - last_used_at: 2000-01-23T04:56:07.000+00:00
          revoked_at: 2000-01-23T04:56:07.000+00:00
          key_prefix: key_prefix
          name: name
          created_at: 2000-01-23T04:56:07.000+00:00
          id: 0
        - last_used_at: 2000-01-23T04:56:07.000+00:00
          revoked_at: 2000-01-23T04:56:07.000+00:00
          key_prefix: key_prefix
          name: name
          created_at: 2000-01-23T04:56:07.000+00:00
          id: 0
      properties:
        data:
          items:
            $ref: "#/components/schemas/ApiKey"
          type: array
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
      - data
      - pagination
    ApiKeyCreatedResponse:
      example:
        data:
          key_prefix: key_prefix
          name: name
          created_at: 2000-01-23T04:56:07.000+00:00
          id: 0
          raw_key: raw_key
      properties:
        data:
          $ref: "#/components/schemas/ApiKeyCreated"
      required:
      - data
    Payment:
      example:
        amount: 6
        resource_url: resource_url
        resource_host: resource_host
        tx_hash: tx_hash
        recipient_address: recipient_address
        settlement_latency_ms: 5
        api_key_name: api_key_name
        network: network
        fee_amount: 1
        amount_formatted: amount_formatted
        currency: currency
        id: 0
        settled_at: 2000-01-23T04:56:07.000+00:00
        payer_address: payer_address
      properties:
        id:
          type: integer
        tx_hash:
          type: string
        payer_address:
          type: string
        recipient_address:
          type: string
        amount:
          description: "Amount in atomic units (1 USDC = 1,000,000)"
          type: integer
        amount_formatted:
          description: Human-readable amount (e.g. "1.00 USDC")
          type: string
        currency:
          type: string
        network:
          description: CAIP-2 chain identifier
          type: string
        resource_url:
          type: string
          nullable: true
        resource_host:
          type: string
          nullable: true
        fee_amount:
          type: integer
        settlement_latency_ms:
          type: integer
          nullable: true
        settled_at:
          format: date-time
          type: string
        api_key_name:
