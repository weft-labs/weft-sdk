    PromoBalance:
      description: |
        Freemium promo credit. v1 returns zero values; once the promo
        ledger ships (deferred from spec 10), real balances appear here
        without a shape change.
      example:
        expires_at: 2000-01-23T04:56:07.000+00:00
        scope: weft-search
        balance_usd: "0.00"
      properties:
        balance_usd:
