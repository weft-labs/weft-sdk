    EnrollResourceRequest:
      description: |
        Public self-enrollment payload. `slug` and `category` are intentionally
        not accepted — the server generates the slug from `name`, and category
        is set after the human claims the Resource.
      example:
        kind: agent
        name: Mem0 retrieval agent
        description: Long-term memory retrieval as a service
        wallet_address: 0x742d35Cc6634C0532925a3b844Bc9e7595f0bEb0
      properties:
        kind:
          description: |
            Resource type. Determines which storefront and dashboard surfaces
            apply after claim.
          enum:
          - agent
          - data_api
          - mcp_server
          type: string
        name:
          description: Display name. Becomes the basis for the server-generated `slug`.
          type: string
        description:
          description: Optional human-readable description.
          type: string
        wallet_address:
          description: |
            Optional Ethereum address declared at enrollment time. Stored as
            `declared_wallet_address` on the ghost Resource for later
            reconciliation; never used as the canonical Provider wallet.
          type: string
      required:
      - kind
      - name
    EnrolledResource:
      allOf:
      - $ref: "#/components/schemas/Resource"
      - properties:
          claim_token:
            description: |
              Single-use token. ~256 bits of entropy. Surfaced exactly once,
              in this response. Used to claim the Resource at
              `/dashboard/claims/{claim_token}`.
            type: string
          claim_url:
            description: Absolute path the agent's human controller visits to claim
              the Resource.
            type: string
        required:
        - claim_token
        - claim_url
      description: |
        A Resource as returned by `POST /api/v1/resources/enroll`. Extends the
        public Resource shape with the single-use `claim_token` and `claim_url`.
        These two fields appear ONLY on the enrollment response — never on
        list/show endpoints — and let the enrolling client hand the magic URL
        to its human controller.
      example:
        wallet_address: wallet_address
        claim_url: claim_url
        visibility: public_profile
        kind: agent
        claim_token: claim_token
        claimed: true
        verified: true
        description: description
        created_at: 2000-01-23T04:56:07.000+00:00
        name: name
        id: 0
        category: category
        slug: slug
    EnrolledResourceResponse:
      example:
        data:
          wallet_address: wallet_address
          claim_url: claim_url
          visibility: public_profile
          kind: agent
          claim_token: claim_token
          claimed: true
          verified: true
          description: description
          created_at: 2000-01-23T04:56:07.000+00:00
          name: name
          id: 0
          category: category
          slug: slug
      properties:
        data:
          $ref: "#/components/schemas/EnrolledResource"
      required:
      - data
    Resource:
      description: |
        A Resource is the unit of agent-economy supply: an agent, a paid data
        API, or an MCP server. Resources without a Provider (`claimed: false`)
        are "ghost" Resources — discoverable on their public profile until
        claimed by a human controller, after which they belong to a
        Provider/Organization.
      properties:
        id:
          type: integer
        kind:
          enum:
          - agent
          - data_api
          - mcp_server
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        wallet_address:
          description: Provider's wallet address; null while ghost (no Provider attached).
          type: string
          nullable: true
        category:
          description: |
            Domain category. Only populated for `kind: agent` Resources during
            the v3 → provider/resource transition; null for newer kinds.
          type: string
          nullable: true
        visibility:
          enum:
          - public_profile
          - private_profile
          - unlisted
          type: string
        verified:
          type: boolean
        claimed:
          description: |
            True when the Resource has a Provider attached. Ghost Resources
            (claimed=false) are publicly discoverable but cannot be edited
            until a human claims them.
          type: boolean
        created_at:
          format: date-time
          type: string
      required:
      - claimed
      - created_at
      - id
      - kind
      - name
      - slug
      - verified
      - visibility
    OpenApiDocument:
      additionalProperties: true
      description: |
        An OpenAPI 3.1 document published by a `data_api` Resource. The
        published spec describes the Resource's own endpoints (paths,
        request/response shapes, tags). Pricing is intentionally absent —
        x402 negotiates price per-request via the `402 Payment Required`
        challenge from the resource server.

        The document also carries a `x-weft.profileUrl` extension that
        deep-links back to the Resource's public storefront on weft.
      example:
        components: "{}"
        openapi: 3.1.0
        paths: "{}"
        info: "{}"
      properties:
        openapi:
          example: 3.1.0
          type: string
        info:
          type: object
        paths:
          type: object
        components:
          type: object
      required:
      - info
      - openapi
      - paths
    MessageResponse_data:
      example:
        message: message
      properties:
        message:
          type: string
      required:
      - message
    AuthResponse_data:
      example:
        confirmation_required: true
        user:
          id: 0
          email: email
          status: status
        token: token
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          nullable: true
        confirmation_required:
          type: boolean
      required:
      - confirmation_required
      - user
  securitySchemes:
    bearerAuth:
      bearerFormat: APIKey
      scheme: bearer
      type: http
