    SearchRequest:
      additionalProperties: false
      example:
        query: send email from an agent
        max_results: 4
        filters:
          protocol:
            in:
            - x402
            - x402
            eq: x402
          price:
            range_lte: range_lte
            gte: gte
            lte: lte
            eq: eq
            range_gte: range_gte
          price_atomic:
            range_lte: 0
            gte: 0
            lte: 0
            eq: 0
            range_gte: 0
          type:
            in:
            - api
            - api
            eq: api
      properties:
        query:
          description: Free-text query. Required and non-empty.
          example: send email from an agent
          maxLength: 2000
          minLength: 1
          type: string
        max_results:
          default: 10
          description: "Max number of hits to return. Invalid values are rejected,\
            \ not clamped."
          maximum: 50
          minimum: 1
          type: integer
        filters:
          $ref: "#/components/schemas/SearchFilterSpec"
      required:
      - query
    SearchFilterSpec:
      additionalProperties: false
      description: |
        Structured hard constraints on the query — the weft-search-platform
        `FilterSpec` v1 typed subset, vendored verbatim (D1 contract). Every
        field is optional; an empty object is the no-filter query. Set fields
        are ANDed. Each sub-filter takes exactly one operator; unknown filter
        keys and unknown operators are rejected (`422 INVALID_FILTERS`).

        `price` (USD decimal strings) and `price_atomic` (integer micro-USD) are
        two representations of ONE price constraint — the reasoning form and the
        settlement form. They are MUTUALLY EXCLUSIVE: setting both is
        `422 INVALID_FILTERS`. A JSON number in `price` is rejected (only decimal
        strings), so `{lte: 5}` can never be mis-read as 5 micro-dollars.

        The canonical enum value sets are pinned to the platform spec by the CI
        drift gate (`docs/contracts/search-platform.openapi.yaml`).
      example:
        protocol:
          in:
          - x402
          - x402
          eq: x402
        price:
          range_lte: range_lte
          gte: gte
          lte: lte
          eq: eq
          range_gte: range_gte
        price_atomic:
          range_lte: 0
          gte: 0
          lte: 0
          eq: 0
          range_gte: 0
        type:
          in:
          - api
          - api
          eq: api
      properties:
        price:
          $ref: "#/components/schemas/SearchPriceUsdFilter"
        price_atomic:
          $ref: "#/components/schemas/SearchPriceAtomicFilter"
        type:
          $ref: "#/components/schemas/SearchResourceTypeFilter"
        protocol:
          $ref: "#/components/schemas/SearchProtocolFilter"
    SearchPriceUsdFilter:
      additionalProperties: false
      description: |
        Price constraint in USD, as decimal STRINGS (the reasoning form). Set
        exactly one operator: a scalar (`lte` / `gte` / `eq`) OR a range
        (`range_gte` + `range_lte` together, lower ≤ upper). Each value is a
        string matching `^\d+(\.\d{1,6})?$` (≤ 6 decimals, ≥ 0); a JSON number is
        rejected. Mutually exclusive with `price_atomic`. An unpriced resource is
        excluded from any price-filtered query.
      example:
        range_lte: range_lte
        gte: gte
        lte: lte
        eq: eq
        range_gte: range_gte
      properties:
        lte:
          description: "Price ≤ this many USD (inclusive ceiling), e.g. \"0.009\"."
          pattern: "^\\d+(\\.\\d{1,6})?$"
          type: string
        gte:
          description: "Price ≥ this many USD (inclusive floor), e.g. \"0.001\"."
          pattern: "^\\d+(\\.\\d{1,6})?$"
          type: string
        eq:
          description: "Price exactly this many USD, e.g. \"1.5\"."
          pattern: "^\\d+(\\.\\d{1,6})?$"
          type: string
        range_gte:
          description: "Range lower bound (inclusive), USD. Set with range_lte."
          pattern: "^\\d+(\\.\\d{1,6})?$"
          type: string
        range_lte:
          description: "Range upper bound (inclusive), USD. Set with range_gte."
          pattern: "^\\d+(\\.\\d{1,6})?$"
          type: string
    SearchPriceAtomicFilter:
      additionalProperties: false
      description: |
        The same price constraint in integer micro-USD (1 USDC = 1_000_000
        micro-USD) — the settlement form. Set exactly one operator: a scalar
        (`lte` / `gte` / `eq`) OR a range (`range_gte` + `range_lte` together,
        lower ≤ upper). Mutually exclusive with `price`. An unpriced resource is
        excluded from any price-filtered query.
      example:
        range_lte: 0
        gte: 0
        lte: 0
        eq: 0
        range_gte: 0
      properties:
        lte:
          description: Price ≤ this many micro-USD (inclusive ceiling).
          minimum: 0
          type: integer
        gte:
          description: Price ≥ this many micro-USD (inclusive floor).
          minimum: 0
          type: integer
        eq:
          description: Price exactly this many micro-USD.
          minimum: 0
          type: integer
        range_gte:
          description: "Range lower bound (inclusive), micro-USD. Set with range_lte."
          minimum: 0
          type: integer
        range_lte:
          description: "Range upper bound (inclusive), micro-USD. Set with range_gte."
          minimum: 0
          type: integer
    SearchResourceTypeFilter:
      additionalProperties: false
      description: Resource-type constraint. Set exactly one of `eq` / `in`.
      example:
        in:
        - api
        - api
        eq: api
