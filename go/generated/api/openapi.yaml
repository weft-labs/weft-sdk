          balance_usdc: "12.34"
          tempo_usd: "3.00"
          network: network
        spent_today_usd: "0.0005"
        spent_week_usd: "3.10"
        policy:
          weekly_limit_usd: "50.00"
          daily_limit_usd: "10.00"
          max_tx_usd: "1.00"
