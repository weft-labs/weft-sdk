name: Python SDK

on:
  pull_request:
    paths:
      - "python/**"
      - "spec/**"
      - "scripts/**"
  push:
    branches: ["main"]
    tags: ["v*"]

# Default GITHUB_TOKEN is read-only for the whole workflow. The publish job
# overrides this with its own job-level `permissions:` (id-token: write for
# PyPI Trusted Publishing OIDC, attestations: write for Sigstore provenance).
# Keeping the workflow default minimal closes the default-scope exfiltration
# window on PR-triggered build jobs that run `pip install` against untrusted
# spec/** or scripts/** changes.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install hatchling
          pip install -e .
          pip install pytest pytest-asyncio ruff mypy
      - name: Generate SDK
        run: ../scripts/generate-python.sh
      - name: Verify generated output
        run: ../scripts/test-sdk.sh
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src
      - name: Test
        run: pytest

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # id-token: write is required for both Trusted Publishing AND for the
    # Sigstore attestations the action emits (default-on under release/v1).
    # attestations: write makes the attestation visible on the repo's
    # attestations page in addition to the PyPI release.
    permissions:
      contents: read
      id-token: write
      attestations: write
    defaults:
      run:
        working-directory: python
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tools
        run: pip install hatchling build
      - name: Generate SDK
        run: ../scripts/generate-python.sh
      - name: Build package
        run: python -m build
      # pypa/gh-action-pypi-publish@release/v1 emits Sigstore attestations
      # by default when used with Trusted Publishing (see action README).
      # Setting attestations: true makes the contract explicit so a future
      # default flip cannot silently drop provenance.
      - name: Publish to PyPI with Sigstore attestations
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
          attestations: true
