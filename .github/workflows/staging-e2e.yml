name: Staging E2E

on:
  # Primary trigger: weft-app cd_staging-deploy.yml emits this once staging
  # actually serves the dispatched SHA — avoids the race where staging-e2e
  # ran on PR-open while staging was still rolling out.
  repository_dispatch:
    types: ["weft-app-staging-deployed"]
  workflow_dispatch:
    inputs:
      app_sha:
        description: "weft-app SHA to validate"
        required: true
      openapi_sha256:
        description: "Expected OpenAPI SHA-256"
        required: true
      openapi_version:
        description: "Expected OpenAPI version"
        required: true

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      WEFT_STAGING_BASE_URL: https://staging.weft.network
    steps:
      - name: Resolve candidate
        # Both supported triggers carry app_sha + openapi_sha256 + openapi_version
        # explicitly. The candidate branch name is deterministic from app_sha,
        # so checkout below uses ${SDK_REF} and never needs a PR head_ref.
        env:
          INPUT_APP_SHA: ${{ github.event.inputs.app_sha }}
          INPUT_OPENAPI_SHA256: ${{ github.event.inputs.openapi_sha256 }}
          INPUT_OPENAPI_VERSION: ${{ github.event.inputs.openapi_version }}
          DISPATCH_APP_SHA: ${{ github.event.client_payload.app_sha }}
          DISPATCH_OPENAPI_SHA256: ${{ github.event.client_payload.openapi_sha256 }}
          DISPATCH_OPENAPI_VERSION: ${{ github.event.client_payload.openapi_version }}
        run: |
          if [ -n "$INPUT_APP_SHA" ]; then
            APP_SHA="$INPUT_APP_SHA"
            OPENAPI_SHA256="$INPUT_OPENAPI_SHA256"
            OPENAPI_VERSION="$INPUT_OPENAPI_VERSION"
          elif [ -n "$DISPATCH_APP_SHA" ]; then
            APP_SHA="$DISPATCH_APP_SHA"
            OPENAPI_SHA256="$DISPATCH_OPENAPI_SHA256"
            OPENAPI_VERSION="$DISPATCH_OPENAPI_VERSION"
          else
            echo "::error::No app_sha provided via workflow_dispatch inputs or repository_dispatch payload"
            exit 1
          fi

          if ! echo "$APP_SHA" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error::app_sha must be a 40-character git SHA"
            exit 1
          fi
          if ! echo "$OPENAPI_SHA256" | grep -qE '^[0-9a-f]{64}$'; then
            echo "::error::openapi_sha256 must be a 64-character lowercase hex SHA-256"
            exit 1
          fi
          if ! echo "$OPENAPI_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::openapi_version must be semver"
            exit 1
          fi

          SDK_REF="sdk-candidate/weft-app-${APP_SHA:0:12}"
          echo "APP_SHA=$APP_SHA" >> "$GITHUB_ENV"
          echo "OPENAPI_SHA256=$OPENAPI_SHA256" >> "$GITHUB_ENV"
          echo "OPENAPI_VERSION=$OPENAPI_VERSION" >> "$GITHUB_ENV"
          echo "SDK_REF=$SDK_REF" >> "$GITHUB_ENV"

      - name: Checkout candidate branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SDK_REF }}
          fetch-depth: 0
          # Do not persist GITHUB_TOKEN creds — `npm install` in later steps
          # could otherwise see them via lifecycle scripts. The marker push
          # below uses an explicit PAT-authed remote URL.
          persist-credentials: false

      - name: Check staging provenance
        run: ./scripts/check-staging-candidate.sh "$WEFT_STAGING_BASE_URL" "$APP_SHA"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install TypeScript dependencies
        run: cd typescript && npm install

      - name: Build TypeScript SDK
        run: cd typescript && npm run build

      - name: Run TypeScript staging e2e
        env:
          EXPECTED_OPENAPI_SHA256: ${{ env.OPENAPI_SHA256 }}
        run: node scripts/e2e-typescript-staging.mjs

      - name: Mark candidate green
        env:
          GH_TOKEN: ${{ secrets.WEFT_BOT_TOKEN }}
        run: |
          CANDIDATE_FILE=".release-candidates/weft-app-$APP_SHA.json"
          if [ "$(jq -r '.status // empty' "$CANDIDATE_FILE")" = "green" ]; then
            echo "Candidate marker already green"
            exit 0
          fi
          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          ./scripts/write-release-candidate.sh "$APP_SHA" "$OPENAPI_SHA256" "$OPENAPI_VERSION" "$SDK_REF" green "$RUN_URL"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .release-candidates
          if git diff --cached --quiet; then
            echo "Candidate marker already green"
            exit 0
          fi
          git commit -m "chore(candidate): mark weft-app@${APP_SHA:0:12} green"
          # Push the marker through an explicit PAT-authed remote URL.
          # Checkout did not persist credentials, so the default remote has
          # no usable token attached. This keeps the PAT scoped to this
          # single step instead of leaking through persisted git config.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${SDK_REF}"
