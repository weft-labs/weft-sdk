name: TypeScript SDK

on:
  pull_request:
    paths:
      - "typescript/**"
      - "spec/**"
      - "scripts/**"
  push:
    branches: ["main"]
    tags: ["v*"]

# Default GITHUB_TOKEN is read-only for the whole workflow. The publish job
# overrides this with its own job-level `permissions:` (id-token: write for
# npm Trusted Publishing OIDC, attestations: write for Sigstore provenance).
# Keeping the workflow default minimal closes the default-scope exfiltration
# window on PR-triggered build jobs that run `npm install` against untrusted
# spec/** or scripts/** changes.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Generate SDK
        run: npm run generate
      - name: Verify generated output
        run: ../scripts/test-sdk.sh
      - name: Lint
        run: npm run lint:check
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # id-token: write is required for npm provenance (Sigstore via GitHub
    # OIDC). attestations: write lets the npm CLI record the provenance on
    # the repository's attestations page in addition to the registry.
    permissions:
      contents: read
      id-token: write
      attestations: write
    defaults:
      run:
        working-directory: typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: npm install
      - name: Generate SDK
        run: npm run generate
      - name: Build
        run: npm run build
      # --provenance attaches a Sigstore-signed provenance statement to the
      # publish, tying the artifact to this workflow run + commit. Required
      # by https://docs.npmjs.com/generating-provenance-statements. Node 24
      # ships npm >= 9.5.0 which is the minimum for the flag.
      - name: Publish to npm with provenance
        run: npm publish --access public --provenance
