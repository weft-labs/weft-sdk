name: "CD: SDK Updated Dispatch"

# Fires `weft-sdk-updated` to weft-labs/weft-app whenever weft-sdk main advances
# with changes that affect consumed artifacts. weft-app's handler opens an
# auto-PR that pins the four SDK clients at this SHA. Re-firing with the same
# SHA is safe: the handler dedupes via the candidate branch name
# (`sdk-candidate/<short_sha>`).
#
# Mirrors the dispatch idiom in weft-app/.github/workflows/cd_openapi-dispatch.yml
# (curl + jq + short-lived GitHub App installation token, repository_dispatch
# event_type). The cross-repo dispatch is authed by a `weft-release-bot` App
# token minted per-run and scoped to weft-app `contents: write` — the built-in
# GITHUB_TOKEN cannot reach a different repository.

on:
  push:
    branches: [main]
    paths:
      - "typescript/**"
      - "python/**"
      - "ruby/**"
      - "go/**"
      - "spec/**"

concurrency:
  group: dispatch-sdk-updated
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Mint weft-app App token (cross-repo dispatch)
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: weft-labs
          repositories: weft-app
          permission-contents: write

      - name: Dispatch weft-sdk-updated to weft-app
        env:
          DISPATCH_TOKEN: ${{ steps.app-token.outputs.token }}
          SDK_SHA: ${{ github.sha }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "::error::App installation token was not minted"
            exit 1
          fi
          SDK_SHORT_SHA="${SDK_SHA:0:12}"
          curl -sS --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            https://api.github.com/repos/weft-labs/weft-app/dispatches \
            --data "$(jq -n \
              --arg sdk_sha "$SDK_SHA" \
              --arg sdk_short_sha "$SDK_SHORT_SHA" \
              '{event_type:"weft-sdk-updated",client_payload:{sdk_sha:$sdk_sha,sdk_short_sha:$sdk_short_sha}}')"
