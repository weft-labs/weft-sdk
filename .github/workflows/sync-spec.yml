name: Sync OpenAPI Spec

# S2 shape (replaces the candidate-marker JSON pattern):
# weft-app dispatches `weft-app-openapi-updated` → this workflow regenerates
# all four SDKs from the new spec, opens an auto-PR, and enables
# `gh pr merge --auto --squash`. The PR's required checks (per-language
# build/test jobs in typescript.yml / python.yml / ruby.yml / go.yml plus
# the staging e2e job in e2e.yml) are the gate — no `.release-candidates/`
# JSON marker is written or read anywhere in this pipeline anymore.
#
# The receiver here is idempotent: re-running with the same `app_sha`
# regenerates the same `sdk-candidate/<short_sha>` branch with
# `--force-with-lease`, edits the PR in place, and re-enables auto-merge.
# Safe under either S1 dispatch timing (immediate or post-staging-deploy).

on:
  repository_dispatch:
    types: ["weft-app-openapi-updated"]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    # All write operations (candidate branch push, PR create/edit, auto-merge
    # enable) go through a short-lived weft-release-bot GitHub App installation
    # token scoped to weft-sdk (`contents: write`, `pull-requests: write`), via
    # an explicit `git remote set-url` and the `gh` CLI. The cross-repo read of
    # weft-app's openapi.yaml uses a separate App token scoped to weft-app
    # (`contents: read`). The default GITHUB_TOKEN only needs read access for
    # the checkout itself. The create-github-app-token action uses
    # app-id + private-key, so no `id-token` permission is required.
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Default GITHUB_TOKEN credentials are not needed for any
          # subsequent step: writes go through an explicit App-token-authed
          # remote. Keeping persist-credentials false avoids leaking the
          # token to npm/pip lifecycle scripts during generation.
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Mint weft-app App token (cross-repo spec read)
        # Minted immediately before the cross-repo spec fetch — not at job
        # start — to keep the exposure window tight. The token is scoped to
        # weft-app `contents: read` and auto-revoked by the action's post step
        # (~1h TTL). Uses app-id + private-key, so no `id-token` permission is
        # needed. Mirrors release.yml's just-in-time mint pattern.
        uses: actions/create-github-app-token@v3
        id: app-token-read
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: weft-labs
          repositories: weft-app
          permission-contents: read

      - name: Fetch spec from dispatch payload
        if: github.event_name == 'repository_dispatch'
        env:
          OPENAPI_URL: ${{ github.event.client_payload.openapi_url }}
          OPENAPI_TOKEN: ${{ steps.app-token-read.outputs.token }}
          APP_SHA: ${{ github.event.client_payload.app_sha }}
        run: |
          if [ -z "$OPENAPI_URL" ]; then
            echo "::error::client_payload.openapi_url is required for repository_dispatch"
            exit 1
          fi
          EXPECTED_OPENAPI_URL="https://api.github.com/repos/weft-labs/weft-app/contents/docs/openapi.yaml?ref=$APP_SHA"
          if [ "$OPENAPI_URL" != "$EXPECTED_OPENAPI_URL" ]; then
            echo "::error::Unexpected OpenAPI URL: $OPENAPI_URL"
            echo "::error::Expected: $EXPECTED_OPENAPI_URL"
            exit 1
          fi
          curl -fsSL \
            -H "Authorization: Bearer $OPENAPI_TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" \
            "$OPENAPI_URL" \
            -o spec/openapi.yaml

      - name: Validate dispatch provenance
        if: github.event_name == 'repository_dispatch'
        env:
          APP_SHA: ${{ github.event.client_payload.app_sha }}
          OPENAPI_SHA256: ${{ github.event.client_payload.openapi_sha256 }}
          OPENAPI_VERSION: ${{ github.event.client_payload.openapi_version }}
        run: |
          if ! echo "$APP_SHA" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error::client_payload.app_sha must be a 40-character git SHA"
            exit 1
          fi
          if ! echo "$OPENAPI_SHA256" | grep -qE '^[0-9a-f]{64}$'; then
            echo "::error::client_payload.openapi_sha256 must be a 64-character lowercase hex SHA-256"
            exit 1
          fi
          if ! echo "$OPENAPI_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::client_payload.openapi_version must be semver"
            exit 1
          fi
          ACTUAL_SHA256="$(sha256sum spec/openapi.yaml | cut -d ' ' -f 1)"
          if [ "$ACTUAL_SHA256" != "$OPENAPI_SHA256" ]; then
            echo "::error::Fetched OpenAPI SHA-256 $ACTUAL_SHA256 does not match payload $OPENAPI_SHA256"
            exit 1
          fi

      - name: Align package versions to OpenAPI version
        if: github.event_name == 'repository_dispatch'
        env:
          OPENAPI_VERSION: ${{ github.event.client_payload.openapi_version }}
        run: ./scripts/bump-version.sh "$OPENAPI_VERSION"

      - name: Generate SDKs
        run: ./scripts/generate-all.sh

      - name: Verify generated output
        run: ./scripts/test-sdk.sh

      - name: Mint weft-sdk App token (branch push + PR ops + auto-merge)
        # Minted only after generate + verify succeed, immediately before the
        # branch push / PR ops. The token is scoped to weft-sdk
        # `contents: write` + `pull-requests: write` and auto-revoked by the
        # action's post step (~1h TTL). Uses app-id + private-key, so no
        # `id-token` permission is needed. Mirrors release.yml's just-in-time
        # mint pattern — shrinks the exposure window across `npm install` and
        # the generate-all step.
        uses: actions/create-github-app-token@v3
        id: app-token-write
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: weft-labs
          repositories: weft-sdk
          permission-contents: write
          permission-pull-requests: write

      - name: Open or update auto-PR
        env:
          GH_TOKEN: ${{ steps.app-token-write.outputs.token }}
          APP_SHA: ${{ github.event.client_payload.app_sha }}
          OPENAPI_SHA256: ${{ github.event.client_payload.openapi_sha256 }}
          OPENAPI_VERSION: ${{ github.event.client_payload.openapi_version }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes detected — spec already in sync. Nothing to PR."
            exit 0
          fi

          if [ -n "$APP_SHA" ]; then
            SHORT_SHA="${APP_SHA:0:12}"
            BRANCH="sdk-candidate/weft-app-${SHORT_SHA}"
            TITLE="sdk(auto): regen for openapi ${SHORT_SHA}"
            COMMIT_MESSAGE="sdk(auto): regen for openapi ${SHORT_SHA}"
            BODY=$(cat <<EOF
          Auto-generated from weft-app@${APP_SHA}.

          - OpenAPI SHA-256: ${OPENAPI_SHA256}
          - OpenAPI version: ${OPENAPI_VERSION}

          This PR auto-merges once required checks pass (per-language build/test
          and the staging e2e job that exercises the regenerated TypeScript SDK
          against \`${WEFT_STAGING_BASE_URL:-https://staging.weft.network}\`).
          The PR's check status IS the release gate — there is no separate
          \`.release-candidates/\` marker.
          EOF
          )
          else
            SHORT_SHA="manual-$(date +%Y%m%d%H%M%S)"
            BRANCH="sdk-candidate/manual-${SHORT_SHA}"
            TITLE="sdk(auto): regen for openapi (manual dispatch)"
            COMMIT_MESSAGE="sdk(auto): regen for openapi (manual dispatch)"
            BODY="Manual OpenAPI sync via workflow_dispatch. Auto-merge enabled once required checks pass."
          fi

          git checkout -B "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Authenticate via an Authorization header rather than a token-in-URL,
          # so the token never lands in a remote URL (git can't echo a
          # credential-bearing URL on a verbose remote rejection) or persist in
          # .git/config's remote.origin.url. Mirrors release.yml + the scheme
          # actions/checkout uses. No `set -x` is active in this step.
          AUTH_HEADER="Authorization: Basic $(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')"
          git config --local http.https://github.com/.extraheader "$AUTH_HEADER"
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git add -A
          git commit -m "$COMMIT_MESSAGE"
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            git fetch --no-tags origin "$BRANCH:refs/remotes/origin/$BRANCH"
          fi
          git push --force-with-lease origin "$BRANCH"

          if gh pr view "$BRANCH" --json number > /dev/null 2>&1; then
            gh pr edit "$BRANCH" --title "$TITLE" --body "$BODY"
          else
            gh pr create --title "$TITLE" --body "$BODY" --base main --head "$BRANCH"
          fi

          echo "PR_BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Enable auto-merge
        # The PR's required checks (typescript / python / ruby / go build+test
        # jobs, which trigger on changes to spec/** and scripts/**, plus the
        # staging e2e job in e2e.yml) are the merge gate. Squash-merging keeps
        # main's history one-commit-per-spec-bump. We refuse to act if more
        # than one open PR matches the branch, since auto-merging the wrong
        # PR would land unverified code on main.
        if: env.PR_BRANCH != ''
        env:
          GH_TOKEN: ${{ steps.app-token-write.outputs.token }}
          PR_BRANCH: ${{ env.PR_BRANCH }}
        run: |
          PR_LIST=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$PR_BRANCH" \
            --base main \
            --state open \
            --json number)
          COUNT=$(echo "$PR_LIST" | jq 'length')
          if [ "$COUNT" -eq 0 ]; then
            echo "No open PR for $PR_BRANCH → main — nothing to enable auto-merge on"
            exit 0
          fi
          if [ "$COUNT" -gt 1 ]; then
            echo "::error::Found $COUNT open PRs for $PR_BRANCH → main — refusing to enable auto-merge on an ambiguous target"
            echo "$PR_LIST" | jq .
            exit 1
          fi
          PR_NUMBER=$(echo "$PR_LIST" | jq -r '.[0].number')
          echo "Enabling auto-merge on PR #$PR_NUMBER ($PR_BRANCH → main)"
          gh pr merge "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --auto \
            --squash
