name: Ruby SDK

on:
  pull_request:
    paths:
      - "ruby/**"
      - "spec/**"
      - "scripts/**"
  push:
    branches: ["main"]
    tags: ["v*"]

# Default GITHUB_TOKEN is read-only for the whole workflow. The publish job
# overrides this with its own job-level `permissions:` (id-token: write for
# RubyGems Trusted Publishing OIDC, attestations: write for the
# actions/attest-build-provenance attestation on the built .gem). Keeping the
# workflow default minimal closes the default-scope exfiltration window on
# PR-triggered build jobs that run `bundle install` against untrusted spec/**
# or scripts/** changes.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruby
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ruby
      - name: Generate SDK
        run: ../scripts/generate-ruby.sh
      - name: Verify generated output
        run: ../scripts/test-sdk.sh
      - name: Test
        run: bundle exec rake test

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # id-token: write is required for both RubyGems Trusted Publishing
    # (OIDC) and for actions/attest-build-provenance below.
    # attestations: write lets the attestation land on the repo's
    # attestations page (gh attestation verify <gem-file>).
    permissions:
      contents: read
      id-token: write
      attestations: write
    defaults:
      run:
        working-directory: ruby
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ruby
      - name: Generate SDK
        run: ../scripts/generate-ruby.sh
      - name: Build gem
        run: gem build weft-sdk.gemspec
      # RubyGems has no first-party Sigstore attestation pipeline on
      # `gem push` (rubygems/configure-rubygems-credentials@v2 covers OIDC
      # credentials only). We attach a GitHub-native build-provenance
      # attestation to the built .gem before publishing; consumers can
      # verify with `gh attestation verify weft-sdk-<version>.gem
      # --repo weft-labs/weft-sdk`.
      - name: Attest gem provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "ruby/weft-sdk-*.gem"
      - name: Configure RubyGems trusted publishing
        uses: rubygems/configure-rubygems-credentials@v2.0.0
      - name: Publish to RubyGems
        run: gem push weft-sdk-*.gem
