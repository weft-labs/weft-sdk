name: Release

on:
  repository_dispatch:
    types: [release]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract version from dispatch
        # S2: the `.release-candidates/` marker is retired. The auto-PR's
        # check status (e2e + per-language build/test jobs) is the gate, and
        # by the time `release.yml` runs the regenerated SDK code is already
        # on `main`. We extract the dispatch fields for tagging + provenance
        # but no longer look up a marker file or check out a candidate
        # branch. S6 will rewrite this workflow end-to-end; for now we only
        # remove the marker dependency so this PR is mergeable independently.
        run: |
          VERSION=$(jq -r '.client_payload.version // empty' "$GITHUB_EVENT_PATH")
          APP_SHA=$(jq -r '.client_payload.app_sha // empty' "$GITHUB_EVENT_PATH")
          OPENAPI_SHA256=$(jq -r '.client_payload.openapi_sha256 // empty' "$GITHUB_EVENT_PATH")
          OPENAPI_VERSION=$(jq -r '.client_payload.openapi_version // empty' "$GITHUB_EVENT_PATH")
          if [ -z "$VERSION" ]; then
            echo "::error::No version in dispatch payload"
            exit 1
          fi
          if ! echo "$APP_SHA" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error::No valid app_sha in dispatch payload"
            exit 1
          fi
          if ! echo "$OPENAPI_SHA256" | grep -qE '^[0-9a-f]{64}$'; then
            echo "::error::No valid openapi_sha256 in dispatch payload"
            exit 1
          fi
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION (expected semver e.g. 0.3.0)"
            exit 1
          fi
          if [ "$OPENAPI_VERSION" != "$VERSION" ]; then
            echo "::error::OpenAPI version ($OPENAPI_VERSION) must match release version ($VERSION)"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "APP_SHA=$APP_SHA" >> "$GITHUB_ENV"
          echo "OPENAPI_SHA256=$OPENAPI_SHA256" >> "$GITHUB_ENV"
          echo "OPENAPI_VERSION=$OPENAPI_VERSION" >> "$GITHUB_ENV"
          echo "Release version: $VERSION"

      - name: Bump version files
        run: |
          chmod +x scripts/bump-version.sh
          ./scripts/bump-version.sh "$VERSION"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Set up Ruby
        uses: ruby/setup-ruby@09a7688d3b55cf0e976497ff046b70949eeaccfd # v1
        with:
          ruby-version: "3.2"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.23"

      - name: Install dependencies
        run: |
          cd typescript && npm install && cd ..
          cd python && pip install -e . && pip install pytest pytest-asyncio && cd ..
          cd ruby && bundle install && cd ..

      - name: Generate all SDKs
        run: |
          chmod +x scripts/generate-all.sh scripts/generate-*.sh scripts/test-sdk.sh
          ./scripts/generate-all.sh

      - name: Run TypeScript tests
        run: cd typescript && npm test
        continue-on-error: false

      - name: Run Python tests
        run: cd python && pytest
        continue-on-error: false

      - name: Run Ruby tests
        run: cd ruby && bundle exec rake test
        continue-on-error: false

      - name: Run Go tests
        run: cd go && go test ./...
        continue-on-error: false

      - name: Commit release version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fail early if tags already exist to prevent partial release state
          if git ls-remote --tags origin | grep -q "refs/tags/v$VERSION$"; then
            echo "::error::Tag v$VERSION already exists on remote"
            exit 1
          fi
          if git ls-remote --tags origin | grep -q "refs/tags/go/v$VERSION$"; then
            echo "::error::Tag go/v$VERSION already exists on remote"
            exit 1
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "release: v$VERSION"
          fi

      - name: Create and push tags
        env:
          # Push with WEFT_BOT_TOKEN, not the default GITHUB_TOKEN: GitHub
          # suppresses workflow runs for events created by GITHUB_TOKEN, so
          # tags pushed with it never trigger the per-language publish jobs.
          # Scoped to this step only (not persisted on checkout) so the token
          # is not exposed to npm install / generation steps.
          BOT_TOKEN: ${{ secrets.WEFT_BOT_TOKEN }}
        run: |
          # Create the main version tag (triggers typescript, python, ruby workflows)
          git tag "v$VERSION"
          # Create the Go module tag (triggers go workflow + proxy indexing)
          git tag "go/v$VERSION"
          # Drop the GITHUB_TOKEN auth header persisted by actions/checkout.
          # Without this, git attaches it to the push below and it overrides
          # the URL-embedded bot token — the push authenticates as
          # GITHUB_TOKEN again and the publish workflows never trigger.
          git config --unset-all 'http.https://github.com/.extraheader' || true
          # Push both tags via the bot token so the publish workflows fire
          git push "https://x-access-token:${BOT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "v$VERSION" "go/v$VERSION"
          echo "Pushed tags: v$VERSION, go/v$VERSION"
