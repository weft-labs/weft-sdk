name: Release

on:
  repository_dispatch:
    types: [release]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract version from dispatch
        run: |
          VERSION=$(jq -r '.client_payload.version // empty' "$GITHUB_EVENT_PATH")
          APP_SHA=$(jq -r '.client_payload.app_sha // empty' "$GITHUB_EVENT_PATH")
          OPENAPI_SHA256=$(jq -r '.client_payload.openapi_sha256 // empty' "$GITHUB_EVENT_PATH")
          OPENAPI_VERSION=$(jq -r '.client_payload.openapi_version // empty' "$GITHUB_EVENT_PATH")
          if [ -z "$VERSION" ]; then
            echo "::error::No version in dispatch payload"
            exit 1
          fi
          if ! echo "$APP_SHA" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error::No valid app_sha in dispatch payload"
            exit 1
          fi
          if ! echo "$OPENAPI_SHA256" | grep -qE '^[0-9a-f]{64}$'; then
            echo "::error::No valid openapi_sha256 in dispatch payload"
            exit 1
          fi
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION (expected semver e.g. 0.3.0)"
            exit 1
          fi
          if [ "$OPENAPI_VERSION" != "$VERSION" ]; then
            echo "::error::OpenAPI version ($OPENAPI_VERSION) must match release version ($VERSION)"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "APP_SHA=$APP_SHA" >> "$GITHUB_ENV"
          echo "OPENAPI_SHA256=$OPENAPI_SHA256" >> "$GITHUB_ENV"
          echo "OPENAPI_VERSION=$OPENAPI_VERSION" >> "$GITHUB_ENV"
          echo "CANDIDATE_REF=sdk-candidate/weft-app-${APP_SHA:0:12}" >> "$GITHUB_ENV"
          echo "Release version: $VERSION"

      - name: Checkout release candidate
        run: |
          git fetch origin "$CANDIDATE_REF"
          git checkout FETCH_HEAD
          ./scripts/verify-release-candidate.sh "$APP_SHA" "$OPENAPI_SHA256" "$OPENAPI_VERSION" green

      - name: Bump version files
        run: |
          chmod +x scripts/bump-version.sh
          ./scripts/bump-version.sh "$VERSION"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Set up Ruby
        uses: ruby/setup-ruby@09a7688d3b55cf0e976497ff046b70949eeaccfd # v1
        with:
          ruby-version: "3.2"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.21"

      - name: Install dependencies
        run: |
          cd typescript && npm install && cd ..
          cd python && pip install -e . && pip install pytest pytest-asyncio && cd ..
          cd ruby && bundle install && cd ..

      - name: Generate all SDKs
        run: |
          chmod +x scripts/generate-all.sh scripts/generate-*.sh scripts/test-sdk.sh
          ./scripts/generate-all.sh

      - name: Run TypeScript tests
        run: cd typescript && npm test
        continue-on-error: false

      - name: Run Python tests
        run: cd python && pytest
        continue-on-error: false

      - name: Run Ruby tests
        run: cd ruby && bundle exec rake test
        continue-on-error: false

      - name: Run Go tests
        run: cd go && go test ./...
        continue-on-error: false

      - name: Commit release version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fail early if tags already exist to prevent partial release state
          if git ls-remote --tags origin | grep -q "refs/tags/v$VERSION$"; then
            echo "::error::Tag v$VERSION already exists on remote"
            exit 1
          fi
          if git ls-remote --tags origin | grep -q "refs/tags/go/v$VERSION$"; then
            echo "::error::Tag go/v$VERSION already exists on remote"
            exit 1
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "release: v$VERSION"
          fi

      - name: Create and push tags
        run: |
          # Create the main version tag (triggers typescript, python, ruby workflows)
          git tag "v$VERSION"
          # Create the Go module tag (triggers go workflow + proxy indexing)
          git tag "go/v$VERSION"
          # Push both tags
          git push origin "v$VERSION" "go/v$VERSION"
          echo "Pushed tags: v$VERSION, go/v$VERSION"
