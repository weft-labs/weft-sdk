name: Release

# S6 shape (replaces tag-first / publish-on-tag):
# weft-app dispatches `release` after its product tag has been validated.
# This workflow:
#   1. Validates the dispatch payload (version + app SHA + OpenAPI hash).
#   2. Builds all four SDKs locally from current weft-sdk main HEAD with the
#      bumped version baked in.
#   3. Runs e2e against staging.weft.network using the LOCALLY-BUILT
#      TypeScript SDK — exercising the exact artifact that will ship.
#   4. Only after e2e is green:
#        - commits the version bump to main via a short-lived weft-release-bot
#          GitHub App installation token (minted per-run)
#        - tags `v<version>` and `go/v<version>` on that commit
#        - pushes commit + tags
#      The tag push is what triggers the existing per-language publishers
#      (typescript.yml / python.yml / ruby.yml / go.yml). Those workflows
#      attach provenance attestations on publish (npm auto-provenance with
#      trusted publishing, PyPI Sigstore default, RubyGems via
#      actions/attest-build-provenance on the built .gem, Go via the same
#      action on the source tarball).
#   5. If e2e is red: no commit, no tag, no publish. Recovery is fix-forward
#      and bump (v0.X.Y+1).
#
# The previous shape tagged first and ran publish-on-tag, leaving no
# pre-publish e2e gate. The reorder here is the substantive change.

on:
  repository_dispatch:
    types: [release]

# Default token has no write needs in this workflow — the only write
# operations (commit-push + tag-push) go through a short-lived weft-release-bot
# GitHub App installation token (minted per-run, scoped to weft-sdk
# `contents: write`) fed to git via an Authorization header. Keeping the
# default GITHUB_TOKEN read-only is defence in depth against
# npm/pip/bundler lifecycle scripts exfiltrating an over-scoped token during
# install. The create-github-app-token action uses app-id + private-key, so no
# `id-token` permission is required here.
permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      WEFT_STAGING_BASE_URL: https://staging.weft.network
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Validate dispatch payload
        # Mirrors the contract emitted by weft-app/.github/workflows/cd_release.yml:
        # event_type=release; client_payload={version, app_sha, weft_app_tag,
        # openapi_sha256, openapi_version}. We refuse any payload missing
        # one of these or shaped wrong, before we touch the working tree.
        run: |
          VERSION=$(jq -r '.client_payload.version // empty' "$GITHUB_EVENT_PATH")
          APP_SHA=$(jq -r '.client_payload.app_sha // empty' "$GITHUB_EVENT_PATH")
          OPENAPI_SHA256=$(jq -r '.client_payload.openapi_sha256 // empty' "$GITHUB_EVENT_PATH")
          OPENAPI_VERSION=$(jq -r '.client_payload.openapi_version // empty' "$GITHUB_EVENT_PATH")
          if [ -z "$VERSION" ]; then
            echo "::error::No version in dispatch payload"
            exit 1
          fi
          if ! echo "$APP_SHA" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error::client_payload.app_sha must be a 40-char git SHA"
            exit 1
          fi
          if ! echo "$OPENAPI_SHA256" | grep -qE '^[0-9a-f]{64}$'; then
            echo "::error::client_payload.openapi_sha256 must be a 64-char lowercase hex SHA-256"
            exit 1
          fi
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION (expected semver e.g. 0.3.0)"
            exit 1
          fi
          if [ "$OPENAPI_VERSION" != "$VERSION" ]; then
            echo "::error::OpenAPI version ($OPENAPI_VERSION) must match release version ($VERSION)"
            exit 1
          fi
          # Refuse early if the tags already exist remotely — otherwise we
          # would do all the e2e work and then fail at push time.
          if git ls-remote --tags origin | grep -q "refs/tags/v$VERSION$"; then
            echo "::error::Tag v$VERSION already exists on remote"
            exit 1
          fi
          if git ls-remote --tags origin | grep -q "refs/tags/go/v$VERSION$"; then
            echo "::error::Tag go/v$VERSION already exists on remote"
            exit 1
          fi
          {
            echo "VERSION=$VERSION"
            echo "APP_SHA=$APP_SHA"
            echo "OPENAPI_SHA256=$OPENAPI_SHA256"
            echo "OPENAPI_VERSION=$OPENAPI_VERSION"
          } >> "$GITHUB_ENV"
          echo "Release version: $VERSION (weft-app@$APP_SHA)"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Set up Ruby
        uses: ruby/setup-ruby@09a7688d3b55cf0e976497ff046b70949eeaccfd # v1
        with:
          ruby-version: "3.2"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.23"

      - name: Bump version files
        # bump-version.sh edits the working tree (spec + per-language version
        # pins) but does NOT commit. We hold the commit until after e2e
        # confirms the locally-built artifact works against staging.
        run: |
          chmod +x scripts/bump-version.sh
          ./scripts/bump-version.sh "$VERSION"

      - name: Install per-language dependencies
        run: |
          cd typescript && npm install && cd ..
          cd python && pip install -e . && pip install pytest pytest-asyncio build && cd ..
          cd ruby && bundle install && cd ..

      - name: Generate all SDKs
        run: |
          chmod +x scripts/generate-all.sh scripts/generate-*.sh scripts/test-sdk.sh
          ./scripts/generate-all.sh

      - name: Build TypeScript SDK
        # The e2e step imports the dist/ output of THIS build. That is the
        # whole point of S6: e2e against the locally-built artifact, before
        # we push a tag and before npm sees anything.
        run: cd typescript && npm run build

      - name: Run TypeScript tests
        run: cd typescript && npm test

      - name: Run Python tests
        run: cd python && pytest

      - name: Run Ruby tests
        run: cd ruby && bundle exec rake test

      - name: Run Go tests
        run: cd go && go test ./...

      - name: Compute OpenAPI SHA-256 (for staging cross-check)
        # The locally-bumped spec/openapi.yaml on disk is the version we
        # built the TS SDK from. The e2e runner asserts staging serves the
        # same bytes via its GET /docs/openapi.yaml endpoint
        # (api.getOpenApiDocument()) — same shape as e2e.yml.
        run: |
          ACTUAL_SHA256="$(sha256sum spec/openapi.yaml | cut -d ' ' -f 1)"
          echo "EXPECTED_OPENAPI_SHA256=$ACTUAL_SHA256" >> "$GITHUB_ENV"

      - name: Assert dispatched openapi_sha256 matches built spec
        # The dispatch payload's client_payload.openapi_sha256 is weft-app's
        # claim of the spec it has live on staging. EXPECTED_OPENAPI_SHA256 is
        # the SHA of the spec THIS release was actually built from. If they
        # disagree, weft-app's claimed spec is not the spec we built — the
        # "staging has caught up to this exact spec" guarantee is broken, so
        # we stop here, before the e2e gate and before any publish. Without
        # this comparison the dispatched field is decorative.
        run: |
          if [ "$OPENAPI_SHA256" != "$EXPECTED_OPENAPI_SHA256" ]; then
            echo "::error::Dispatched openapi_sha256 ($OPENAPI_SHA256) does not match the spec this release was built from ($EXPECTED_OPENAPI_SHA256). weft-app's claimed staging spec differs from weft-sdk's built spec — refusing to release."
            exit 1
          fi
          echo "Dispatched openapi_sha256 matches built spec: $EXPECTED_OPENAPI_SHA256"

      - name: Run TypeScript staging e2e
        # Imports ../typescript/dist/index.mjs — the artifact built above
        # from the freshly-bumped, freshly-regenerated source tree. This is
        # the pre-publish gate: if staging is behind, the OpenAPI hash
        # mismatch fails the workflow and no tag is created. Recovery is
        # to wait for staging or fix-forward + bump.
        run: node scripts/e2e-typescript-staging.mjs

      - name: Mint weft-sdk App token (commit + tag push)
        # Minted only on e2e green, immediately before the push. The token is
        # scoped to weft-sdk `contents: write` (commit to main + tag push) and
        # auto-revoked by the action's post step (~1h TTL). Uses app-id +
        # private-key, so no `id-token` permission is needed.
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: weft-labs
          repositories: weft-sdk
          permission-contents: write

      - name: Commit version bump and create tags
        # Only reached on e2e green. Commit the in-tree bump on main, then
        # tag the commit. Both pushed with the weft-release-bot App
        # installation token — required because tags pushed with the
        # workflow's GITHUB_TOKEN do not trigger subsequent workflow runs,
        # which would suppress the per-language publishers we depend on.
        env:
          BOT_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # No `set -x` in this step: a shell trace would echo the token if it
          # ever appeared in a command argument. We also never put the token in
          # a remote URL — git can echo a credential-bearing URL back on a
          # verbose remote rejection. Instead the token is base64-encoded into
          # an HTTP Authorization header configured via `git config`, and the
          # remote stays token-free.
          if [ -z "$BOT_TOKEN" ]; then
            echo "::error::App installation token was not minted"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Authenticate via an Authorization header rather than a token-in-URL.
          # The basic-auth payload is `x-access-token:<token>` base64-encoded
          # and stored in git config; the token never lands in a remote URL, so
          # git cannot echo a credential-bearing URL on a verbose remote
          # rejection. With no `set -x` active, the header value is not traced
          # either. Mirrors the scheme actions/checkout uses for its own token.
          AUTH_HEADER="Authorization: Basic $(printf 'x-access-token:%s' "$BOT_TOKEN" | base64 | tr -d '\n')"
          git config --local http.https://github.com/.extraheader "$AUTH_HEADER"
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git add -A
          if git diff --cached --quiet; then
            echo "No bump diff to commit — main is already at v$VERSION"
          else
            git commit -m "release: v$VERSION"
          fi
          git tag "v$VERSION"
          git tag "go/v$VERSION"
          # Push the bump commit AND both tags in a single invocation so the
          # update is all-or-nothing: either main advances to release:v$VERSION
          # with both tags present (triggering the per-language publishers —
          # typescript.yml/python.yml/ruby.yml on `v*`, go.yml on `go/v*`), or
          # nothing moves. A split push could leave main bumped with no tags
          # (no publish fires) and a re-run hitting inconsistent
          # "tag exists / no bump diff" recovery paths.
          git push origin HEAD:main "v$VERSION" "go/v$VERSION"
          echo "Pushed v$VERSION and go/v$VERSION on commit $(git rev-parse HEAD)"
