openapi: 3.1.0
info:
  title: Weft API
  version: 0.7.0
  description: |
    The Weft API is the buyer-runtime surface that powers the `weft` CLI,
    the hosted MCP server (`weft.network/mcp`), and any third-party agent
    that wants to discover and pay for paid resources on Weft. v1 covers
    five buyer concerns:

      1. Account onboarding (`/api/v1/auth/*`, `/api/v1/me`)
      2. CLI authentication (`/api/v1/api_keys`)
      3. Wallet visibility (`/api/v1/balance`)
      4. Discovery (`/api/v1/search`)
      5. Paid execution (`/api/v1/fetch`)
      6. Purchase history (`/api/v1/payments`)

    Seller-side concerns (agent management, payout analytics, webhook
    delivery, the public storefront for `data_api` resources) live in the
    dashboard and are intentionally not documented here. They will be
    split out into a separate, dashboard-scoped spec when they need to be
    SDK-consumable.

    All errors share the envelope defined by `ErrorResponse`, except the
    buyer-runtime endpoints (`/search`, `/fetch`) which use bespoke
    envelopes carrying additional context — see `SearchErrorResponse` and
    `FetchErrorResponse`.
tags:
  - name: Auth
    description: Account creation and authentication flows.
  - name: Account
    description: Current user account information.
  - name: API Keys
    description: Manage API keys used by the CLI and any direct HTTP caller.
  - name: Balance
    description: |
      Read-only snapshot of the buyer's wallet, spending policy, and
      current-window spend (today / this week).
  - name: Search
    description: |
      Semantic search across the Weft index of paid agent resources.
      Returns A2A-shaped AgentCards with pricing, skills, ranking, and
      endpoints. The mock backend (default while the search-platform is
      unshipped) reads YAML fixtures from `db/seeds/mock-search/`; the
      platform backend proxies to the upstream search service. Both share
      the same response envelope.
  - name: Fetch
    description: |
      The universal x402 fetch proxy. POST any URL the agent wants to
      reach, with a `max_cost_usd` ceiling; Weft handles the `402 Payment
      Required` challenge, signs the EIP-3009 payment from the buyer's
      wallet, replays the request, and streams the upstream artifact
      back base64-encoded. Errors always carry the buyer's current
      policy + balance + dashboard URL so the caller can surface "what
      changed?" without a second round-trip.
  - name: Payments
    description: Payment history and individual purchase details.
  - name: Resources
    description: |
      Public, unauthenticated ghost-resource enrollment. Lets an agent
      self-register so its human controller can later claim it from the
      dashboard.
servers:
  - url: https://weft.network
    description: Production
  - url: https://staging.weft.network
    description: Staging
  - url: http://localhost:3000
    description: Development
paths:
  /docs/openapi.yaml:
    get:
      summary: Fetch this OpenAPI document
      operationId: getOpenApiDocument
      responses:
        "200":
          description: OpenAPI 3.1 document (YAML)
          content:
            application/yaml:
              schema:
                type: string
  /api/v1/resources/enroll:
    post:
      summary: Self-enroll a ghost resource (public, no auth)
      description: |
        Lets an unauthenticated agent (or its operator) self-enroll a
        Resource as a "ghost" (no owning provider). The server generates the
        `slug` and a single-use `claim_token`; the response also carries a
        `claim_url` the agent hands to its human controller to claim the
        resource from the dashboard.

        Client-supplied `slug` and `category` are silently ignored: slugs are
        server-generated from `name` (so callers cannot squat on reserved
        names), and `category` is a post-claim concern set by a real human.

        Rate-limited to 10 enrollments/hour/IP.
      operationId: enrollResource
      tags: [Resources]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceEnrollmentRequest"
      responses:
        "201":
          description: Ghost resource created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceEnrollmentResponse"
        "422":
          description: Validation error (missing/blank fields, or unknown `kind`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded (10 enrollments/hour/IP)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/sign_up:
    post:
      summary: Create an account
      operationId: signUp
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
      responses:
        "200":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/confirm:
    post:
      summary: Confirm an account
      operationId: confirmAccount
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmRequest"
      responses:
        "200":
          description: Account confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "422":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/resend-confirmation:
    post:
      summary: Resend confirmation email
      operationId: resendConfirmation
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendConfirmationRequest"
      responses:
        "200":
          description: Confirmation sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /api/v1/auth/sign_in:
    post:
      summary: Sign in with email and password
      operationId: signIn
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignInRequest"
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/password/reset:
    post:
      summary: Request password reset
      operationId: requestPasswordReset
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "200":
          description: Reset email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /api/v1/auth/password/update:
    post:
      summary: Update password with reset token
      operationId: updatePassword
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordUpdateRequest"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "422":
          description: Invalid or expired reset token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/me:
    get:
      summary: Get current account
      operationId: getMe
      tags: [Account]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: |
            The credential authenticated but has no organization context
            (`ORGANIZATION_REQUIRED`). Account-scoped (buyer) keys cannot read
            this org-scoped endpoint.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/api_keys:
    get:
      summary: List API keys
      operationId: listApiKeys
      tags: [API Keys]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: |
            The credential authenticated but has no organization context
            (`ORGANIZATION_REQUIRED`). Account-scoped (buyer) keys cannot read
            this org-scoped endpoint.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create an API key
      operationId: createApiKey
      tags: [API Keys]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
      responses:
        "201":
          description: API key created (includes raw key, shown only once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreatedResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/api_keys/{id}:
    delete:
      summary: Revoke an API key
      operationId: revokeApiKey
      tags: [API Keys]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: API key ID
      responses:
        "200":
          description: API key revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: API key not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/balance:
    get:
      summary: Get wallet, spending policy, and current-window spend
      description: |
        Read-only snapshot for the buyer behind the bearer token. The
        response always includes a `promo` block — values are zero in v1
        and fill in once the freemium promo ledger ships, without a
        shape change. `wallet.balance_usdc` is fetched live from Privy;
        if Privy is unreachable the field returns `"0.00"` rather than
        erroring the whole call.

        Account-scoped: the bearer must be a buyer-scoped API key.
      operationId: getBalance
      tags: [Balance]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Wallet + policy + spend snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceResponse"
        "401":
          description: Unauthorized — missing or non-buyer-scoped API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: |
            The OAuth access token authenticated but lacks the `balance`
            scope (RFC 6750 `insufficient_scope`). Carries a
            `WWW-Authenticate: Bearer error="insufficient_scope", scope="balance"`
            header. `wk_` API keys are unscoped and never see this.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientScopeResponse"
  /api/v1/search:
    post:
      summary: Search the Weft index
      description: |
        Semantic search over the Weft index of paid agent resources. The
        request body is the weft-search-platform `/v1/search` contract:
        a free-text `query`, optional `max_results`, and optional structured
        `filters` (price / price_atomic / type / protocol — the canonical
        FilterSpec v1 vocabulary, vendored verbatim from the platform). Price is
        a dual representation of one constraint: `price` in USD decimal strings
        (the reasoning form) XOR `price_atomic` in integer micro-USD (the
        settlement form) — mutually exclusive, set at most one.

        Backend selection is server-side via the `SEARCH_BACKEND` env var:
        `mock` (default, reads YAML fixtures and sets `_mock: true` in the
        response) or `platform` (proxies to the upstream search service).
        Both backends return the platform `SearchResponse` envelope.

        Account-scoped: the bearer token must be a buyer-scoped API key.
        Free for authenticated buyers in v1; billing is planned for a later
        release.

        Response negotiation: `Accept: application/json` (default) returns
        the structured envelope; `Accept: text/markdown` returns a rendered
        Markdown digest of the same results — useful for piping into a chat
        UI or LLM prompt.
      operationId: search
      tags: [Search]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
            text/markdown:
              schema:
                type: string
                description: Rendered Markdown digest of the same results.
        "401":
          description: Unauthorized — missing or non-buyer-scoped API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: |
            The OAuth access token authenticated but lacks the `search`
            scope (RFC 6750 `insufficient_scope`). Carries a
            `WWW-Authenticate: Bearer error="insufficient_scope", scope="search"`
            header. `wk_` API keys are unscoped and never see this.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsufficientScopeResponse"
        "422":
          description: |
            Invalid request — empty/missing `query`, out-of-range
            `max_results`, an unknown top-level parameter, or invalid
            `filters` (unknown filter key/operator, bad enum value, or a
            sub-filter without exactly one operator). See the `error` code.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchErrorResponse"
        "502":
          description: Upstream search backend error (platform backend only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchErrorResponse"
        "500":
          description: Backend misconfigured (`SEARCH_BACKEND` unset or unknown)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchErrorResponse"
  /api/v1/fetch:
    post:
      summary: Pay-and-fetch any URL (x402 proxy)
      description: |
        Universal x402 fetch proxy. The caller provides a target `url`,
        a hard `max_cost_usd` ceiling, and optional `method` / `body` /
        `headers`. Weft:

          1. Issues the request.
          2. On `402 Payment Required`, parses the merchant's challenge.
          3. Compares the asking price to `max_cost_usd` and the
             buyer's policy (`max_tx_usd`, daily/weekly limits).
          4. Signs an EIP-3009 transfer from the buyer's wallet.
          5. Replays the request with the `X-Payment` header.
          6. Streams the upstream artifact back, base64-encoded under
             `body_base64`, with `paid_usd`, `tx_hash`, and the
             merchant's reputation snapshot.

        Errors are structured with a stable `error` code, and each error
        response carries the buyer's `policy`, `balance`, and a
        `dashboard_url` so a CLI can render an actionable message without
        a second round-trip.

        Account-scoped: the bearer must be a buyer-scoped API key.

        **Forwarded headers:** the caller's `headers` are passed through
        to the upstream, except a denylist of hop-by-hop and
        Weft-internal headers (`host`, `authorization`, `cookie`,
        `proxy-authorization`, `x-forwarded-*`, `x-real-ip`,
        `x-payment`, `connection`, `upgrade`). Up to 32 headers, 4 KB of
        combined value bytes.
      operationId: fetch
      tags: [Fetch]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FetchRequest"
      responses:
        "200":
          description: Fetch succeeded (or upstream was free); artifact streamed back base64-encoded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchResponse"
        "401":
          description: Unauthorized — missing or non-buyer-scoped API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: |
            Payment refused. `EXCEEDED_MAX_COST` (over the caller cap) or
            `INSUFFICIENT_BALANCE` (the buyer is genuinely short). Also
            `CONVERSION_UNAVAILABLE` — a cross-chain provision route is down
            while the buyer's funds are intact (`details.venue`,
            `details.retryable: true`); retry later, do NOT top up. All use
            `FetchErrorResponse`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchErrorResponse"
        "403":
          description: |
            Policy violation, denylisted recipient, or a merchant challenge on a
            chain outside the wallet's own environment — a testnet wallet may
            not pay a mainnet challenge, nor the reverse
            (`WALLET_ENVIRONMENT_MISMATCH`; terminal, not retryable). All three
            use `FetchErrorResponse`. Alternatively an OAuth access token
            lacking the `fetch` scope (`InsufficientScopeResponse`, RFC 6750
            `insufficient_scope`, with a `WWW-Authenticate` challenge). The two
            envelopes are disjoint; branch on the `error` value.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/FetchErrorResponse"
                  - $ref: "#/components/schemas/InsufficientScopeResponse"
        "413":
          description: Upstream artifact exceeded the proxy's size cap.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchErrorResponse"
        "422":
          description: |
            Invalid request URL, a merchant payment method Weft cannot sign
            (`UNSUPPORTED_PAYMENT_METHOD`), or a merchant settlement token Weft
            cannot convert into (`UNSUPPORTED_ASSET` — the token's on-chain
            `currency()` is not USD; terminal for this merchant, funds
            untouched, `details.asset` names it).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchErrorResponse"
        "424":
          description: |
            `MERCHANT_RETURNED_NON_402` — the upstream merchant is at fault: it
            did not return a 402, or its 402 challenge was invalid. A 4xx (not
            5xx) because Weft behaved correctly and the caller should act on
            `details.reason` (e.g. pick another merchant); it also keeps the
            error envelope intact through CDNs that replace 5xx bodies.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchErrorResponse"
        "502":
          description: Settlement signing failed on Weft's side (`SETTLEMENT_FAILED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchErrorResponse"
  /api/v1/payments:
    get:
      summary: List payments
      operationId: listPayments
      tags: [Payments]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: per_page
          in: query
          schema:
            type: integer
            default: 25
            maximum: 100
          description: Items per page
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: |
            The credential authenticated but has no organization context
            (`ORGANIZATION_REQUIRED`). Account-scoped (buyer) keys cannot read
            this org-scoped endpoint.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/payments/{id}:
    get:
      summary: Get payment details
      operationId: getPayment
      tags: [Payments]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Payment ID
      responses:
        "200":
          description: Payment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: APIKey
  schemas:
    ErrorResponse:
      type: object
      description: |
        Standard error envelope returned by all `/api/v1` endpoints except
        `/search` and `/fetch` (which use bespoke envelopes carrying
        additional context). `error.code` is stable across releases and
        safe to branch on; `error.message` is human-readable and may change.
      properties:
        error:
          $ref: "#/components/schemas/Error"
      required: [error]
      example:
        error:
          code: "unauthorized"
          message: "Invalid or expired API key"
          request_id: "req_01HX9F3K7B2N4P8Q1R6T8Y2Z5"
    Error:
      type: object
      description: |
        A single error inside an `ErrorResponse` envelope. `code` is the
        stable machine-readable identifier (snake_case), `message` is
        human-readable, `details` carries optional structured context
        (e.g. validation field breakdown), and `request_id` correlates
        with server logs for debugging.
      properties:
        code:
          type: string
          description: Stable machine-readable error code (snake_case).
          example: "validation_failed"
        message:
          type: string
          description: Human-readable error description.
          example: "Email has already been taken"
        details:
          type: object
          nullable: true
          description: Optional structured context about the failure.
        request_id:
          type: string
          description: Correlates with server logs; include when reporting bugs.
          example: "req_01HX9F3K7B2N4P8Q1R6T8Y2Z5"
      required: [code, message]
    InsufficientScopeResponse:
      type: object
      required: [error, error_description, scope]
      description: |
        RFC 6750 §3.1 `insufficient_scope` error. Returned with HTTP 403 and
        a `WWW-Authenticate: Bearer error="insufficient_scope", scope="..."`
        header when an OAuth access token authenticates successfully but does
        not carry the scope the endpoint requires. Only OAuth bearer tokens
        are scope-gated; `wk_`-prefixed API keys are unscoped and never see
        this response.
      properties:
        error:
          type: string
          enum: [insufficient_scope]
          example: insufficient_scope
        error_description:
          type: string
          example: The access token does not include the required scope.
        scope:
          type: string
          description: Space-delimited list of scopes the endpoint requires.
          example: balance
    MessageResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            message:
              type: string
          required: [message]
      required: [data]
    ResourceEnrollmentRequest:
      type: object
      required: [kind, name]
      description: |
        `slug` and `category` are accepted but silently ignored — the server
        generates the slug from `name`, and category is a post-claim concern.
      properties:
        kind:
          type: string
          description: |
            Resource kind. Must be one of the supported kinds (currently
            `agent`); an unknown value is rejected with a 422.
          example: agent
        name:
          type: string
          description: Human-readable name; the server derives the slug from it.
          example: Self-Enrolled Bot
        description:
          type: string
        wallet_address:
          type: string
          description: |
            Declared EVM wallet address for the ghost resource. Stored as a
            claim (unverified) until the resource is claimed.
    ResourceEnrollmentResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/EnrolledResource"
    EnrolledResource:
      type: object
      description: |
        The `:created` view of a ghost resource. Adds `stats`, the single-use
        `claim_token`, and the `claim_url` to the base resource shape. The
        claim fields appear ONLY on this enrollment response — never in list
        or read views.
      required:
        - id
        - name
        - slug
        - kind
        - visibility
        - category
        - verified
        - claimed
        - created_at
        - stats
        - claim_token
        - claim_url
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        kind:
          type: string
          example: agent
        visibility:
          type: string
          example: public_profile
        wallet_address:
          type: string
          nullable: true
          description: Declared wallet address, or `null` if none was provided.
        category:
          type: string
          nullable: true
          description: |
            Legacy v3 taxonomy field. Returns a string only for `agent`-kind
            resources that carry a `category` in their metadata; `null` for
            all other kinds and for agents without one. Always `null` on
            enrollment (category is a post-claim concern).
        verified:
          type: boolean
        claimed:
          type: boolean
          description: True once the resource has an owning provider. Always false at enrollment.
        created_at:
          type: string
          format: date-time
        stats:
          $ref: "#/components/schemas/ResourceStats"
        claim_token:
          type: string
          description: Single-use token for the magic claim URL. Surfaced only on enrollment.
        claim_url:
          type: string
          nullable: true
          description: Dashboard path the agent hands to its human to claim the resource.
    ResourceStats:
      type: object
      description: Aggregate public payment stats for the resource.
      required:
        - total_paid
        - total_received
        - payments_made
        - payments_received
        - unique_counterparties
        - first_seen
        - last_active
      properties:
        total_paid:
          type: integer
          description: Total atomic units paid out by this resource.
        total_received:
          type: integer
          description: Total atomic units received by this resource.
        payments_made:
          type: integer
        payments_received:
          type: integer
        unique_counterparties:
          type: integer
        first_seen:
          type: string
          format: date-time
          nullable: true
        last_active:
          type: string
          format: date-time
          nullable: true
    Pagination:
