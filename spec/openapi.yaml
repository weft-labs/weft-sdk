    Payment:
      type: object
      properties:
        id:
          type: integer
        tx_hash:
          type: string
        payer_address:
          type: string
        recipient_address:
          type: string
        amount:
          type: integer
          description: Amount in atomic units (1 USDC = 1,000,000)
        amount_formatted:
          type: string
          description: Human-readable amount (e.g. "1.00 USDC")
        currency:
          type: string
        network:
          type: string
          description: CAIP-2 chain identifier
        resource_url:
          type: string
          nullable: true
        resource_host:
          type: string
          nullable: true
        fee_amount:
          type: integer
        settlement_latency_ms:
          type: integer
          nullable: true
        settled_at:
          type: string
          format: date-time
        api_key_name:
          type: string
      required: [id, tx_hash, payer_address, recipient_address, amount, amount_formatted, currency, network, settled_at, api_key_name]
    PaymentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Payment"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required: [data, pagination]
    PaymentResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Payment"
      required: [data]
    BalanceResponse:
      type: object
      description: |
        Buyer's wallet snapshot. Note: unlike `/me` / `/payments` / `/api_keys`,
        this endpoint does NOT use a `data:` envelope — the response object
        is the snapshot directly.
      required: [promo, wallet, spent_today_usd, spent_week_usd, policy]
      properties:
        promo:
          $ref: "#/components/schemas/PromoBalance"
        wallet:
          $ref: "#/components/schemas/Wallet"
        spent_today_usd:
          type: string
          description: USD spent in the current calendar day (UTC), 2dp.
          example: "0.42"
        spent_week_usd:
          type: string
          description: USD spent in the current calendar week (UTC, Monday start), 2dp.
          example: "3.10"
        policy:
          $ref: "#/components/schemas/SpendingPolicy"
    PromoBalance:
      type: object
      description: |
        Freemium promo credit. v1 returns zero values; once the promo
        ledger ships (deferred from spec 10), real balances appear here
        without a shape change.
      required: [balance_usd, scope, expires_at]
      properties:
        balance_usd:
          type: string
          example: "0.00"
        scope:
          type: string
          description: Where the promo can be spent.
          example: "weft-search"
        expires_at:
          type: string
          format: date-time
          nullable: true
    Wallet:
      type: object
      required: [address, balance_usdc, tempo_usd, total_usd, network]
      properties:
        address:
          type: string
          nullable: true
          description: EVM address of the buyer's Privy-managed wallet. Null if no wallet provisioned.
        balance_usdc:
          type: string
          description: Live Base USDC balance, 2dp. Returns "0.00" if the upstream wallet provider is unreachable.
          example: "12.34"
        tempo_usd:
          type: string
          nullable: true
          description: >
            Aggregated USD value of the allowlisted Tempo TIP-20 dollar tokens on
            the wallet's paired Tempo chain, 2dp. `null` when the value is
            UNKNOWN — the Tempo RPC read failed, or no dollar token is
            allowlisted for that chain yet (e.g. Tempo mainnet pre-launch). A
            null here is never "0.00"; it means "we couldn't determine it", and
            `total_usd` then reflects the Base component only.
          example: "3.00"
        total_usd:
          type: string
          nullable: true
          description: >
            Single aggregated USD balance = Base USDC + Tempo dollar tokens, 2dp.
            When `tempo_usd` is null (unavailable/unallowlisted) this equals
            `balance_usdc` alone. Null when the Base USDC provider is
            unreachable, because the surface never claims zero for a component it
            could not read.
          example: "15.34"
        network:
          type: string
          nullable: true
          description: Wallet network (e.g. `base-sepolia`).
    SpendingPolicy:
      type: object
      required: [max_tx_usd, daily_limit_usd, weekly_limit_usd]
      properties:
        max_tx_usd:
          type: string
          description: Maximum USD per single transaction.
          example: "1.00"
        daily_limit_usd:
          type: string
          description: Maximum USD spent in a 24-hour window.
          example: "10.00"
        weekly_limit_usd:
          type: string
          description: Maximum USD spent in a 7-day window.
          example: "50.00"
    SearchRequest:
      type: object
      required: [query]
      additionalProperties: false
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 2000
          description: Free-text query. Required and non-empty.
          example: "send email from an agent"
        max_results:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
          description: Max number of hits to return. Invalid values are rejected, not clamped.
        filters:
          $ref: "#/components/schemas/SearchFilterSpec"
    SearchFilterSpec:
      type: object
      additionalProperties: false
      description: |
        Structured hard constraints on the query — the weft-search-platform
        `FilterSpec` v1 typed subset, vendored verbatim (D1 contract). Every
        field is optional; an empty object is the no-filter query. Set fields
        are ANDed. Each sub-filter takes exactly one operator; unknown filter
        keys and unknown operators are rejected (`422 INVALID_FILTERS`).

        `price` (USD decimal strings) and `price_atomic` (integer micro-USD) are
        two representations of ONE price constraint — the reasoning form and the
        settlement form. They are MUTUALLY EXCLUSIVE: setting both is
        `422 INVALID_FILTERS`. A JSON number in `price` is rejected (only decimal
        strings), so `{lte: 5}` can never be mis-read as 5 micro-dollars.

        The canonical enum value sets are pinned to the platform spec by the CI
        drift gate (`docs/contracts/search-platform.openapi.yaml`).
      properties:
        price:
          $ref: "#/components/schemas/SearchPriceUsdFilter"
        price_atomic:
          $ref: "#/components/schemas/SearchPriceAtomicFilter"
        type:
          $ref: "#/components/schemas/SearchResourceTypeFilter"
        protocol:
          $ref: "#/components/schemas/SearchProtocolFilter"
    SearchPriceUsdFilter:
      type: object
      additionalProperties: false
      description: |
        Price constraint in USD, as decimal STRINGS (the reasoning form). Set
        exactly one operator: a scalar (`lte` / `gte` / `eq`) OR a range
        (`range_gte` + `range_lte` together, lower ≤ upper). Each value is a
        string matching `^\d+(\.\d{1,6})?$` (≤ 6 decimals, ≥ 0); a JSON number is
        rejected. Mutually exclusive with `price_atomic`. An unpriced resource is
        excluded from any price-filtered query.
      properties:
        lte:
          type: string
          pattern: '^\d+(\.\d{1,6})?$'
          description: Price ≤ this many USD (inclusive ceiling), e.g. "0.009".
        gte:
          type: string
          pattern: '^\d+(\.\d{1,6})?$'
          description: Price ≥ this many USD (inclusive floor), e.g. "0.001".
        eq:
          type: string
          pattern: '^\d+(\.\d{1,6})?$'
          description: Price exactly this many USD, e.g. "1.5".
        range_gte:
          type: string
          pattern: '^\d+(\.\d{1,6})?$'
          description: Range lower bound (inclusive), USD. Set with range_lte.
        range_lte:
          type: string
          pattern: '^\d+(\.\d{1,6})?$'
          description: Range upper bound (inclusive), USD. Set with range_gte.
    SearchPriceAtomicFilter:
      type: object
      additionalProperties: false
      description: |
        The same price constraint in integer micro-USD (1 USDC = 1_000_000
        micro-USD) — the settlement form. Set exactly one operator: a scalar
        (`lte` / `gte` / `eq`) OR a range (`range_gte` + `range_lte` together,
        lower ≤ upper). Mutually exclusive with `price`. An unpriced resource is
        excluded from any price-filtered query.
      properties:
        lte:
          type: integer
          minimum: 0
          description: Price ≤ this many micro-USD (inclusive ceiling).
        gte:
          type: integer
          minimum: 0
          description: Price ≥ this many micro-USD (inclusive floor).
        eq:
          type: integer
          minimum: 0
          description: Price exactly this many micro-USD.
        range_gte:
          type: integer
          minimum: 0
          description: Range lower bound (inclusive), micro-USD. Set with range_lte.
        range_lte:
          type: integer
          minimum: 0
          description: Range upper bound (inclusive), micro-USD. Set with range_gte.
    SearchResourceTypeFilter:
      type: object
      additionalProperties: false
      description: Resource-type constraint. Set exactly one of `eq` / `in`.
      properties:
        eq:
          type: string
          enum: [api, agent, mcp_tool, webpage, feed, document, dataset]
          description: Resource type is exactly this value.
        in:
          type: array
          minItems: 1
          items:
            type: string
            enum: [api, agent, mcp_tool, webpage, feed, document, dataset]
          description: Resource type is one of these values.
    SearchProtocolFilter:
      type: object
      additionalProperties: false
      description: Payment-protocol constraint. Set exactly one of `eq` / `in`.
      properties:
        eq:
          type: string
          enum: [x402, a2a, mpp, erc_8004]
          description: Primary protocol is exactly this value.
        in:
          type: array
          minItems: 1
          items:
            type: string
            enum: [x402, a2a, mpp, erc_8004]
          description: Primary protocol is one of these values.
    SearchResponse:
      type: object
      required: [query_trace_id, query, embedder_model, candidates_considered, warnings, results]
      description: |
        The weft-search-platform `POST /v1/search` response envelope. The
        mock backend emits the same shape and adds `_mock: true`.
      properties:
        query_trace_id:
          type: string
          format: uuid
          description: Opaque trace id for the served query, matching the platform `query_trace_id`.
        query:
          type: string
        applied_filters:
          $ref: "#/components/schemas/SearchFilterSpec"
          description: |
            The `FilterSpec` actually applied to recall, echoed back so the
            caller sees exactly what constrained the results. In the current
            contract this is the caller's `filters` verbatim (empty object when
            none were sent).
        decomposition_source:
          type: string
          enum: [CALLER, CLASSIFIER, MERGED, FALLBACK]
          description: |
            Origin of `applied_filters`. `CALLER` today (the mock and the B1
            platform have no query decomposer yet); `CLASSIFIER` / `MERGED` /
            `FALLBACK` arrive additively when the decomposer lands.
        embedder_model:
          type: string
        candidates_considered:
          type: integer
          minimum: 0
        warnings:
          type: array
          items:
            type: object
            required: [code, message]
            properties:
              code:
                type: string
              message:
                type: string
              cause:
                type: string
                nullable: true
                description: Typed cause for codes that carry one (e.g. `DECOMPOSE_FALLBACK`). Null otherwise.
              context:
                type: object
                nullable: true
                description: Structured context for the warning. Null when the code carries none.
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
        _mock:
          type: boolean
          description: Present and `true` only when served by the mock backend.
    SearchResult:
      type: object
      required: [provider, capability, endpoints, score]
      properties:
        provider:
          $ref: "#/components/schemas/SearchProviderRef"
        capability:
          $ref: "#/components/schemas/SearchCapabilityRef"
        endpoints:
          type: array
          items:
            $ref: "#/components/schemas/SearchEndpointHit"
        score:
          type: number
          format: double
          minimum: 0
          maximum: 1
    SearchProviderRef:
      type: object
      properties:
        provider_id:
          type: string
        display_name:
          type: string
          nullable: true
        origin_domains:
          type: array
          items:
            type: string
        verification_state:
          type: string
          nullable: true
        identity_confidence:
          type: number
          nullable: true
    SearchCapabilityRef:
      type: object
      properties:
        capability_id:
          type: string
        capability_type:
          type: string
          nullable: true
        resolution_confidence:
          type: number
          nullable: true
    SearchEndpointHit:
      type: object
      properties:
        endpoint_id:
          type: string
        url:
          type: string
          nullable: true
        resource_type:
          type: string
          nullable: true
        primary_protocol:
          type: string
          nullable: true
        price_atomic:
          type: integer
          nullable: true
          description: |
            Price in atomic units (micro-USD) for this endpoint. Use this for
            settlement (exact, integer). Null when unpriced.
        price_usd:
          type: string
          nullable: true
          description: |
            Server-derived price in USD as a decimal string (= `price_atomic` /
            1e6, e.g. "0.008" for `price_atomic` 8000) — the dollar value people
            and agents reason in. A decimal string, never a float; trailing zeros
            trimmed. Null when unpriced (mirrors `price_atomic`). For settlement
            use `price_atomic`.
        price_currency:
          type: string
          nullable: true
        price_decimals:
          type: integer
          nullable: true
        operated_by_id:
          type: string
          nullable: true
        operated_by_type:
          type: string
          nullable: true
        settled_via_facilitator_id:
          type: string
          nullable: true
        ranking:
          $ref: "#/components/schemas/SearchEndpointRanking"
    SearchEndpointRanking:
      type: object
      properties:
        similarity:
          type: number
          nullable: true
        price_atomic:
          type: integer
          nullable: true
        rank_reason:
          type: string
          nullable: true
        probe_status:
          type: string
          nullable: true
        median_ttfb_ms:
          type: integer
          nullable: true
        min_total_latency_ms:
          type: integer
          nullable: true
        max_total_latency_ms:
          type: integer
          nullable: true
    SearchErrorResponse:
      type: object
      required: [error]
      description: |
        Bespoke error envelope returned by `/api/v1/search` for `422`, `502`,
        and `500` responses. It differs from the standard `ErrorResponse`
        envelope (no nested `code`/`message`/`request_id`); SDK clients
        should handle both shapes for this endpoint until the controller
        is migrated to the standard envelope.
      properties:
        error:
          type: string
          description: Stable error code.
          enum:
            - INVALID_QUERY
            - INVALID_MAX_RESULTS
            - INVALID_FILTERS
            - UNKNOWN_PARAMETER
            - SEARCH_UPSTREAM_ERROR
            - SEARCH_BACKEND_MISCONFIGURED
        details:
          type: object
          additionalProperties: true
          description: Optional context. Shape varies by error code.
    FetchRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: Target URL. Must pass Weft's URL safety check (no SSRF / private IP ranges).
          example: "https://x402.api.agentmail.to/v0/inboxes"
        max_cost_usd:
          type: string
          pattern: '^\d+(\.\d{1,6})?$'
          default: "0.10"
          description: Hard ceiling on what the buyer is willing to pay. Defaults to `0.10` USD.
          example: "0.05"
        method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE]
          default: GET
          description: HTTP method to use against the upstream.
        body:
          description: Request body forwarded to the upstream. Pass `null` for GET.
          oneOf:
            - type: string
            - type: object
            - type: "null"
        headers:
          type: object
          additionalProperties:
            type: string
          description: |
            Headers forwarded to the upstream. Up to 32 headers, 4 KB
            total. The following are silently stripped: `host`,
            `authorization`, `cookie`, `proxy-authorization`,
            `x-forwarded-*`, `x-real-ip`, `x-payment`, `connection`,
            `upgrade`.
          example:
            Accept: application/json
            User-Agent: my-agent/1.0
    FetchResponse:
      type: object
      description: |
        Successful fetch envelope. `body_base64` is the upstream artifact
        bytes, base64-encoded. `paid_usd`, `tx_hash`, and `merchant` are
        populated only when the upstream charged for the response.
      required: [status, headers, body_base64, paid_usd, tx_hash, artifact_id, merchant]
      properties:
        status:
          type: integer
          description: HTTP status returned by the upstream after the paid replay.
          example: 200
        headers:
          type: object
          additionalProperties:
            type: string
          description: Response headers from the upstream.
        body_base64:
          type: string
          description: Base64-encoded response body. Empty string for empty bodies.
        paid_usd:
          type: string
          nullable: true
          description: USD amount actually settled. Null for free upstreams.
          example: "0.002"
        tx_hash:
          type: string
          nullable: true
          description: Settlement transaction hash. Null for free upstreams.
        artifact_id:
          type: integer
          nullable: true
          description: Internal artifact identifier if the response was persisted; `null` otherwise.
        merchant:
          allOf:
            - $ref: "#/components/schemas/Merchant"
          nullable: true
          description: Merchant reputation snapshot. Null for free upstreams.
    Merchant:
      type: object
      required: [address, settlement_count, first_seen_at, dispute_count]
      properties:
        address:
          type: string
          description: EVM address that received the payment.
        settlement_count:
          type: integer
          minimum: 0
          description: All-time settlement count for this merchant address.
        first_seen_at:
          type: string
          format: date-time
          nullable: true
          description: First time Weft observed a payment to this address.
        dispute_count:
          type: integer
          minimum: 0
          description: All-time dispute count for this merchant address.
    FetchErrorResponse:
      type: object
      required: [error, details, policy, balance, dashboard_url]
      description: |
        Bespoke error envelope for `/api/v1/fetch`. Every error carries the
        buyer's current `policy`, `balance`, and a `dashboard_url` so a CLI
        can render an actionable message without a second round-trip.

        `error` values include the fixed codes listed below plus the
        `POLICY_VIOLATION_<REASON>` family, where `<REASON>` is the violated
        policy field (`MAX_TX`, `DAILY`, or `WEEKLY` — see
        `PolicyViolation::REASONS`).
      properties:
        error:
          type: string
          description: Stable error code.
          example: EXCEEDED_MAX_COST
          enum:
            - INVALID_URL
            - EXCEEDED_MAX_COST
            - INSUFFICIENT_BALANCE
            - CONVERSION_UNAVAILABLE
            - MERCHANT_RETURNED_NON_402
            - ARTIFACT_TOO_LARGE
            - DENYLISTED_RECIPIENT
            - WALLET_ENVIRONMENT_MISMATCH
            - SETTLEMENT_FAILED
            - UNSUPPORTED_PAYMENT_METHOD
            - UNSUPPORTED_ASSET
            - POLICY_VIOLATION_MAX_TX
            - POLICY_VIOLATION_DAILY
            - POLICY_VIOLATION_WEEKLY
        details:
          type: object
          additionalProperties: true
          description: Optional context. Shape varies by error code.
        policy:
          $ref: "#/components/schemas/SpendingPolicy"
        balance:
          $ref: "#/components/schemas/FetchBalanceSnapshot"
        dashboard_url:
          type: string
          format: uri
          description: Deep-link to the dashboard's policy page.
    FetchBalanceSnapshot:
      type: object
      required: [promo_usd, wallet_usdc, tempo_usd, total_usd, spent_today_usd]
      description: |
        Compact balance snapshot returned inside `FetchErrorResponse`. Less
        rich than `BalanceResponse` — just the fields a CLI needs to explain
        why a fetch failed.
      properties:
        promo_usd:
          type: string
          example: "0.00"
        wallet_usdc:
          type: string
          description: Live Base USDC balance.
          example: "12.34"
        tempo_usd:
          type: string
          nullable: true
          description: >
            Aggregated USD of allowlisted Tempo dollar tokens, 2dp. `null` when
            UNKNOWN (RPC read failed or no token allowlisted for the paired
            chain) — never "0.00" for an unread component.
          example: "3.00"
        total_usd:
          type: string
          nullable: true
          description: >
            Aggregated USD balance = Base USDC + Tempo dollar tokens, 2dp. Equals
            `wallet_usdc` alone when `tempo_usd` is null. Null when the Base USDC
            provider is unreachable.
          example: "15.34"
        spent_today_usd:
          type: string
          example: "0.42"
